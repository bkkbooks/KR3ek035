body:
  text: 卷四參朮遇仙丹百另二治三十六種大風諸惡危症人參白朮各一兩川芎皂角刺藁本蟬殼天麻各二兩羌活獨活細辛紫參丹參沙參知母各三兩元參當歸荊芥穗紅花蒼朮各四兩穿山甲殭蠶蜈蚣漏蘆萆薢石斛秦艽各一兩乳香沒藥血竭各七錢五分麝香五分木香二兩五錢地龍八錢苦參皮半斤上為末蜜丸桐子大每服五十丸溫酒下忌牛羊豬肉野味雞鵝燒酒房事避風為上子和方百另三五經風症少人知金肺傷風損兩眉肝木不仁身紫色土脾受濕癬斑皮火心傳遍傷雙目水腎生災漏兩蹄識透五般風病症才堪世上作良醫又云蟲入肺經先落眉蟲入心經手拳蟲入脾經身麻木蟲入腎經穿腳底蟲入肝經眼目反蟲入胃經將癢皮第一神效散百另四黃柏末皂角灰各三錢研勻作一服溫酒調空心服晚勿食至二三更必下蟲大小長短者甚多第二清氣散百另五枳殼檳榔青皮陳皮厚朴澤瀉半夏茯苓豬苓當歸水煎服第三大皂丸百另六皂角二十刮去黑皮酒炙黃研末另以十片搗取汁煉膏丸梧子大空心酒下三十丸第四消風散百另七白芷全蠍人參各一兩上為末每服一錢空心溫酒下第五順氣散百另八苦參皮二斤烏藥防風各四兩上為末每服三錢酒下大風丸百另九治眉目遍身穢爛者大風子肉三十兩防風川芎各十兩蟬殼羌活細辛首烏獨活苦參當歸牛膝全蠍黃耆薄荷各二兩白芷狗脊牛黃血竭各五錢上為末米糊丸桐子大每服十五丸茶下空心服日進三次外以桑條灰二斗滾湯淋汁洗頭面有瘡者以汁調灰塗之或用黑豆緑豆浸取豆漿三日煎湯浴一次仍頻洗腳大麻三方百十治一切大麻風危者大有功效當歸川芎熟地桃仁防風荊芥紫蘇薄荷芒硝連翹赤芍桔梗紫萍麻黃紅花蘇木大黃白朮厚朴山梔黃芩丹皮石膏甘草各一錢滑石一錢五分水煎服十劑重者加全蠍上部加升麻下部加木瓜牛膝麝香獨活發熱加乾葛柴胡面部加白附子氣滯加木香磨酒沖服發表攻裡散百十一老人牙灰四個牛蝨三十個焙桑蟲四條焙穿山甲虎骨酥炙鹿角灰各一兩蜈蚣二十條炙敗龜板炙蜂房炙官桂各一兩麝香五分牛黃三分蜒蚰四條血餘灰雞鵝卵殼煅各一兩上為末每服三錢酒下丸方百十二苦參皮一斤酒浸一夜曬皂角八兩花椒四兩上為末酒糊丸桐子大每服五十丸空心溫酒下奪命丹百十三苦參桔梗升麻當歸白芍連翹荊芥防風羌活蒼朮各四兩獨活茯苓黃芩川芎蛇床子各二兩薄荷大黃白芷各五兩陳皮半夏乾葛各三兩枳殼一斤甘草一兩山梔半斤芒硝三兩上均作十帖水煎服丸方百十四防風當歸牛蒡荊芥各四兩蒺藜胡麻各二斤荊子苦參各一斤大風子肉六斤血竭八兩牛黃三錢麝香六錢冰片一錢五分辰砂七錢上為末蜜丸梧子大每服八十丸空心酒下擦方百十五丟子三錢杏仁二十粒蛇床子檳榔防風荊芥苦參風藤川槿皮威靈仙茅香藁本菊花藿香甘松麝香細辛水銀車米硫黃枯礬白芷各一錢共研末擦之洗方百十六荊芥防風菊花枳殼金銀花大風子蔓荊子苦參元參沙參煎湯洗之上方治心肝二經受病其色青遍身紫緑色或有泡初起眉毛未落面目瘙癢如蟲行之狀者神妙若加桃柳楮桑槐嫩枝在內煎湯洗更妙遠年大風煎方百十七升麻川芎枳殼陳皮天麻各三兩黃連黃芩前胡連翹地骨皮各四兩麻黃五兩全蠍薄荷各二兩木香三錢丟子一斤眼昏加菊花黃柏各一兩麻木加木通滑石各一兩爛瘡加雄黃苦參各一兩紫泡加紅花蘇木各一兩身痛加羌活防風蒼朮各一兩面癢如蟲行加白附子一兩上均作十帖水煎服丸方百十八防風六兩羌活升麻菖蒲連翹牛蒡子前胡檳榔厚朴蒼朮各四兩苦參八兩胡麻花粉蒺藜各一兩殭蠶枸杞木瓜天麻菊花川芎各二兩丟子一斤如紫色加硃砂五錢腳軟加牛膝防己各二兩腳腫加木香五錢瘡爛加雄黃二兩遍身爛加白花蛇一條身痛加羌活獨活各二兩上為末米糊丸桐子大每服百丸白湯下日進三次洗方百十九首烏荊芥防風槐枝苦參馬鞭草金銀花楓樹皮煎湯服下末藥西江月百二十雄黃南星半夏川芎草烏硃砂更加一味白天麻每服半分酒下七味皆為細末分兩稱准無差渾身出汗住疼麻萬兩黃金無價草方百二十一荔枝草箭頭草黃花地丁草蒲公英忍冬藤草各等分曬乾為丸酒下既濟丹百二十二治三十六種危惡大風白砒二錢緑豆腐煮半日人中白六兩醋煅七次明雄黃五錢硃砂四錢上為末每服半分以大黃黑牽牛各五分煎湯空心下七日後追出異蟲從大便出用荊芥湯洗澡則蟲皆墜缸底如身上覺癢將白芨煎湯服藥二七日則面黑腫皆退如愈後即服下除根方除根方百二十三白砒一錢地骨皮丹皮當歸生地各一兩上為末蜜丸卜子大每服十丸或酒或茶下日進三次則永不發服此之後要服蘇骨丹一年蘇骨丹百二十四漢防己三兩風藤四兩甘草二兩松香一斤酒煮一日傾水抽扯五七次白淨細膩俟冷共為末米糊丸桐子大每服七十丸白湯下則筋舒血足矣又方百二十五水銀膽礬明礬各等分上研至不見星以三分擦手足心先服前末藥五七日再服蘇骨丹三五日然後擦二三日又服末藥如此間行之藥酒方百二十六石六軸子四兩烏蛇一條當歸四兩甘草八兩先以水六碗煮甘草汁三碗方入燒酒一斤並三味藥隔湯煮三炷香埋地七日每早飲一杯黃白丹百二十七治大風攣斃敗絶危困者白松香水煮淘五七次又以黃酒或火酒煮曰占各等分為末紅棗肉丸每服百丸酒下漱風散百二十八甘草石斛藁本麻黃乳香各一兩當歸蒼朮細辛荊芥川芎全蠍去硝泥炙牙皂兩頭尖升麻白芷川芎胡麻各三兩草烏三兩六錢川烏二個各重一兩童便浸煨上為末每服五七分酒下麻木者三四服即愈養龍湯百二十九治大風癱攣眉毻歸尾白芷梢全蠍殭蠶蟬殼風藤菖蒲木瓜苦參荊芥甘草薄荷紅花生地連翹蔓荊子首烏米仁角刺牛蒡子白蒺藜威靈仙金銀花五加皮胡麻蝨養骨龍水煎加乳香沒藥服脫胎丹百三十治三十六種風症紅砒四兩羌活獨活黃連山梔皮各五錢硇砂甘草各三錢五分丟子半斤大皂莢六兩共研勻水煮一晝夜微火炒乾加樟水各一兩五錢入罐封固打火三炷香取升起靈藥四兩用青布包之以童便浸山梔皮搗為餅包藥七日取出研末聽用每藥三釐用姜一片荊芥一撮泡湯下七日後身發癢煎白芨湯飲之則止再服苦參丸收功苦參丸百三十一苦參三斤銼片童便浸七日以長流水漂淨曬乾加甘草黃連山梔各三兩共為末水法丸每服百丸酒下日進三次定風酒百三十二治痛風寒濕痿困諸症檀香羌活防風牛膝杜仲芍藥當歸木瓜天麻白芷川芎麻黃陳皮荊芥半夏黃芩官桂蒼朮首烏各一兩沉香木香乳香沒藥血竭紅花各五錢上均作三帖用無灰酒一罈入藥一帖封固隔湯煮五七沸不拘時隨量飲碧霞漿百三十三羌活獨活白芷川烏細辛菖蒲蒼朮風藤苦參當歸防風升麻藁本蒺藜荊芥木瓜薄荷茄根防己天麻川芎射干麻黃水萍胡麻葳蕤首烏木香檀香沉香仙靈脾威靈仙蛇床子枲實金銀花羊躑躅花各五錢酒漿一罈入藥五兩隔湯煮透俟冷每飲一杯避風二時朝夕飲無憂酒百三十四治濕痹諸般腫痛防風牛膝羌活鱉甲炙虎骨炙松節蠶沙白朮各二兩萆薢當歸各三兩秦艽四兩五錢蒼耳子枸杞各四兩茄根皮八兩杜仲一兩五錢紅花藁本香蛇各一兩酒漿一罈入藥四兩煮熟隨量飲甘醴百三十五治麻痹不省人事羊躑躅花一兩北紅棗五十枚風藤二兩燒酒五六碗共入壇內糠火煨飲半小杯令人昏迷一周時酒未完而病已脫神仙酒百三十六治痛風遍身僵腫及半身不遂並外廣瘡寒濕皆效鬧羊花根三斤生薑四兩紅棗六兩醇酒二十碗酒漿十碗將藥浸入酒內煨熟去渣臥時服一小杯烏茶酒百三十七治痛風痹症癘風疙瘩黑腫癱瘓等症烏茶草即七葉連根草當歸五加皮川芎生地芍藥升麻白芷防風各二兩甘草五錢元參蒼耳子各三兩烏藥羌活獨活前胡秦艽金銀花鬧羊花根各一兩千金草即土厭草九首頭香糙米菊回回草二兩好酒一罈入藥隔湯煮透隨量飲醉醒痛止推云酒百三十八又名馮夷瓊漿治紫雲疙瘩攣困麻木剜割不知者川烏三兩泡苦參羌活防風胡麻甘菊荊芥風藤連翹粉草白芷黃連當歸川芎黃芩芍藥牛膝獨活殭蠶蟬殼生地首烏威靈仙金銀花各五錢上均作二帖用酒漿一罈入藥一帖密封蒸之每日三進每進一杯重者四壇全愈輕者一料飲酒時以藥湯頻浴為妙藥湯方備下浴藥方百三十九菊花乾荷葉藿香白芷甘松麻黃沙參各等分為末每水一桶入藥末三錢加桃柳枝各一把煎四五沸睡時於無風處熱洗久出忌豬羊肉房事勞役惟鰻鱺烏魚白鴨啖之方效治冷痛麻風百四十鬧羊花根四兩北紅棗一斤燒酒五斤上藥酒共入壇封固煮一日每飲一小杯一周時醒頓愈苦參膏百四十一治大麻風癮疹攣瘓等症新鮮苦參十斤銼片老酒一罈浸之春五夏三秋七冬九日取出曬乾為末加紫萍五兩用蒼耳草自然汁十碗煎熟加白蜜五六斤同煉成膏入參萍末和勻瓷瓶收貯每用一匙以白湯或酒化下仙黃花膏百四十二三四月間收羊躑躅草連根搗取自然汁煎煉加白蜜成膏量加麝香冰片松香收貯瓷瓶每服一匙酒下昏沉一二時醒後自覺爽快其風癘麻痛頓愈豨蘞膏百四十三六七月間收豨蘞草水洗淨拭去毛刺搗取自然汁文火慢熬不住手攪之勿冷黏底加白蜜煎煉熟加當歸蘇木紅花乳香沒藥血竭木香沉香檀香麝香葳蕤各等分為末煉成膏瓷瓶收貯每用一匙白湯下一方取蒼耳汁對分煎之亦好鉛汞膏百四十四治風癩血枯手足僵攣身內干憔骨瘦如柴者蘇木十斤研碎以水三四桶煎試滴水不散去渣加紫草二斤當歸紅花各一斤銼碎入內再煉去渣再加乳香沒藥血竭沉香檀香香蛇人參麝香各等分為末白蜜二斤同煎煉成膏收貯任服百花膏百四十五透骨草忍冬藤蒲公英鶴蝨草九龍藤野天麻旱蓮草半枝蓮地楊梅豨蘞草蒼耳草紫地丁地錦草旱辣藜大小青薄荷葉靈芝草魚腥草見腫消血見愁淡竹葉南天竹枸杞頭橘樹頭枳椇葉五加葉接骨木石楠頭地蜈蚣萹蓄草馬齒莧野芥菜蛇床葉長青草慎火草太湖蔥各等分搗汁煎加蜜煉成膏再加沉香檀香冰片麝香各等分為末入內收貯瓷瓶勿泄氣每服一匙酒下日進三次倏合時忌婦女雞犬見烏飯膏百四十六治大風攣曲者南天竹即名烏飯時山人呼為一丈虎春夏收其枝葉秋冬取其根皮水熬成膏服太乙神漿百四十七治諸風癘大症肥蟹十二隻雌雄各半去垢淨剁爛入瓷瓶內好嚴漆三十六兩入內念咒六遍以云鶴馬包封埋陰地喜神方向七七日取出日飲一杯咒曰天靈地靈天地清寧神仙和合萬氣本根祛邪療病永保長生吾奉太上老君天醫使者敕令四聖膏百四十八治手背攣曲不舒節間疼痛攤在紙上貼之漸漸痛止伸直薑汁蔥汁各二碗線膠四兩同煎煉再入草烏末四兩為膏如無蔥汁須加火酒再入乳沒各一兩五灰膏百四十九桑柴灰毛竹灰豆箕灰栗柴灰蕎麥灰各五升淋取濃汁文武火煉俟凝加明鹼一塊礦灰一塊硇砂白丁香白附子巴豆附子斑毛各等分為末和勻收貯如冷麻大風腫塊並手足拘攣者以刀刺破皮膚塗之爛去惡肉以除毒根黑雲膏百五十大風大癘紫黑腫塊瘡癬惡形塗之旦夕脫光當歸川烏川椒飛鹽各二兩赤芍白芷羌活木香殭蠶杏仁各五錢黑豆一升半芝麻二升萆