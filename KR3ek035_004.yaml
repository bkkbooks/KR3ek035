午間浴罷摩至申酉時手心足底如火熱用紙條捆縛兩手足底心緊包以免散氣即吃煎藥一大碗如此縛定三日不許解開亦不吃鹽醬不可見風如見風則久不肯變色亦不肯退斑痕止吃煎藥一碗第四日以生雞湯開腥守戒七日全愈擦方二百另五水銀一錢七分膽礬明礬各八分半和研不見星用麻油調厚再久擂之如泥煎方二百另六防風荊芥山梔羌活獨活連翹前胡川芎當歸木瓜花粉黃連風藤白芷皂刺冷飯糰各等分薑棗水煎服三服分三日服之雙根沙皮飲二百另七治初癘瘡又治結毒下疳蛀斡荊芥根二兩麻黃根二兩五錢晚蠶沙五錢白蘚皮五加皮各三兩防風當歸大黃各一兩牙皂九斤天花粉連翹各一兩五錢羌活獨活各七錢土茯苓一斤上均作五帖水煎加酒一半溫服先服十帖丸方二百另八金銀花荊芥穗防風各四兩舊琉璃灰二兩共為末熟地四兩酒煮搗爛再加冷飯糰十兩搗成糊方加藥末為丸桐子大以煎藥送下五十丸其冷飯糰取白肉為妙煎方二百另九當歸防風風藤生地熟地荊芥木通甘草天麻米仁蜂房燒黃香桑寄生赤芍皂刺金銀花白蘚皮大劑每帖加冷飯糰一兩水煎送丸藥下如頭面多加川芎身上多加升麻藁本手臂多加五加皮腳腿多加牛膝木瓜七聖散二百十金銀花四兩杏仁十四粒皂角子七粒牙皂七片殭蠶十四條蟬蛻二錢土茯苓一斤水四碗煎二碗作二三次服輕二帖重三四帖愈白通湯二百十一白朮木通木瓜前胡柴胡羌活獨活花粉金銀花風藤牛膝甘草陳皮角針蒺藜薄荷米仁蒼耳子皂角子各等分每帖加土茯苓一兩薑棗水煎服荊神飲二百十二治癘瘡初起荊芥穗四兩水五六碗煎去三之二濾清服又以一斤煎湯先熏後洗不過三四次即愈無毒不發火珠漿二百十三治初生癘瘡用蛇卵草取自然汁沖酒溫服數碗一連四五次脫愈黃龍髓二百十四治癘瘡初起取白頸蚯蚓於盆內搗爛加水研淘澄清取其清水日服一次二三日即愈杞頭湯二百十五治癘初起即服敗毒散三四帖以枸杞頭二三斤煎濃湯熏洗二三次愈番白飲二百十六此真方也並可治黴毒家嚴注番白草紫花地丁當歸木通皂刺風藤皂角子牛蒡子蛇床子殭蠶十二個桑皮米仁每帖加土茯苓四兩水酒各半煎服十帖病愈八仙湯二百十七兼治癘瘡結毒人參三分米仁二錢花粉一錢二分皂刺二十一個蜂房七孔浮麥一握冷飯糰三兩琉璃灰七分半水煎溫服七帖病愈三川神應湯二百十八川芎牛膝各五分川黃連土黃連各一錢先以飯糰一斤半將竹刀刮去皮止用白肉不用黃色打碎不見鐵器用水四大碗煎至二碗去渣入藥再煎取一碗又用雄豬夾肝煎油三匙入內服三四帖止三分散二百十九治癘風初起用黃花酒拌九蒸曬為末溫酒送下一二分酒儘量飲麻木一晝夜隨服補中湯三帖第四日照前又服三分又服補中湯三帖如此三次初服發瘡二服出水盡干三服脫光永不再發黃白大丹二百二十治同上用槐花半斤以滾湯泡去石灰焙乾為末加白礬四兩酒糊丸桐子大每服五六十丸酒下日進三服服盡病痊坎離丹二百二十一明雄黃一兩明礬二兩共為末每服五分熱酒下如難服用黃米糊丸桐子大服三七日全愈永無毒發棗靈丹二百二十二敗龜板灰馬瓢草地骨皮各一兩槐實川椒油胡桃各一兩如瘡大加樺皮末一兩上為末北紅棗丸梧子大每服三十丸茶下七日愈三母五子丹二百二十三益母草知母貝母槐子蒼耳子蔓荊子皂角子牛蒡子等分為末每一兩加虎脛骨一錢煅存性和白酒糊丸桐子大每服一二十丸溫酒下定痛飲二百二十四治筋骨疼痛久不愈者茜草麻黃烏藥各一錢細茶芽三錢槐子炒焦川椒各五錢魚膘腸三錢米粉和炒成珠乳香一錢姜五片蔥五根煎服三劑全愈七神湯二百二十五蜂房三錢殭蠶二錢角子五個淡竹葉二十片燈心七寸長二十根土茯苓四兩用蛤蟆一隻刮去腹中垢風乾切四塊每帖下一塊煎服如服蛤蟆左前足則愈左手病服左後足則愈左足病上亦然一二帖發起三帖勢定四帖收功歲桃漿二百二十六治癘瘡初起用核桃按歲一枚取白肉豎排炒鍋內每桃上放細茶一撮以酒煎嚼桃飲酒速愈胡麻飯二百二十七大棗二十一枚去核每枚入宮粉填滿每日以三枚和米半升煮飯食之七日棗完瘡愈蠟礬丸二百二十八鬧羊花酒拌九蒸曬草烏酒浸炒白礬黃占溶化各等分上為末加蜜少許丸卜子大每服五六十丸酒下糖岸散二百二十九缸中岸半斤煅黑沙糖半斤拌勻分三次服又以雄黃研飛發灰枯礬各五錢共為末每服三錢酒下天塵丹二百三十頭垢擇婦人者雄黃各二錢硃砂五分均打作十八丸先服一半七日退光不愈再服完則定好酒下保真飲二百三十一精羊肉四兩煮爛取汁六七碗入蟬殼四兩麻黃春秋用一兩五錢夏用一兩冬用二兩再煮存四碗旋服完吃羊肉取汗昏沉一日醒後三日皆退盡無毒如筋骨痛者加上好點紅川椒一兩不痛不必加虛鳴湯二百三十二蟬殼四兩仙遺糧即土茯苓半斤荔枝草一兩麻黃春夏用七錢秋冬用一兩五錢作一帖水三碗煎一碗服三四日脫光瘡多凶者不過三服即愈不發無毒乳酥湯二百三十三精羊肉一斤用水八碗煎至一半取起以酒送下肉存汁加蟬殼四兩川芎一兩威靈仙一兩麻黃春用九錢夏用六錢秋用八錢冬用一兩煎至一碗溫服即換衣穿之以帛包裹頭必出臭汗用荊芥湯洗浴其瘡俱發出不過三四日脫光無毒不發胡麻飲二百三十四金銀花赤茯苓明天麻胡麻各一兩防風荊芥羌活獨活殭蠶連翹五加皮地骨皮當歸黃芩黃連杜仲牛膝黑牽牛米仁角刺各五錢均作十帖加土茯苓一兩肉核油二百三十五防風荊芥首烏花粉苦參各三兩冷飯糰一兩肥皂核肉四兩豬脂油四兩水一碗煎至半作五六服如瘡多不效再一服全愈忌鐵器治結毒方二百三十六硃砂五錢雄黃硫黃各七錢乳香沒藥各二錢共為末以黃占一兩溶化為丸卜子大每服四釐土茯苓四兩煎湯下日進三次又方二百三十七白砒四錢宜減十成之八雄黃一兩黃占一兩牛黃三錢共為末作丸重一分半空心土茯苓煎湯下一丸雷公散二百三十八即再造散鬱金木香各五錢大黃朴硝白醜半生半熟角刺各一兩上為末每服五錢清晨面東酒下量人虛實病勢輕重緩急用之服此之後或蟲如魚腦魚腸惡異之物而出忌食一切毒味發風動氣鮮腥鹽物半月其牛馬驢騾雁雉禽獸糟食熏炙之類終身忌之惟鹿麝可食醉仙散二百三十九胡麻牛蒡子蔓荊子枸杞子各一兩白蒺藜苦參防風栝蔞仁各五錢荊芥二兩蛤粉全蠍藿香各七錢麝香乳香沒藥各六錢車米一兩二錢丟子半斤上為末每服二錢酒下日進三服先服再造散次服補劑元氣復還然後復此忌鹽醬油醋魚椒果子燒炙之物止可食淡粥時菜尤忌茄芥惟烏梢蒸食最好服之身如醉齒中出血或臭水乃見功神仙紫花丸二百四十服前二方完即服此方三年方保無虞白花蛇一兩首烏威靈仙荊芥各四錢麻黃二錢胡麻一錢蛇床子二錢將六味銼碎共蛇用無灰酒一大碗浸一夜去蛇皮骨通曬乃還原酒內再浸再曬酒盡方止為末加人參一兩木香沉香各三錢五分當歸七錢五分天麻牙皂各五錢麝香三錢乳香沒藥各一錢雄黃辰砂各五錢肉豆蔻一個定風草二錢五分還瞳子一兩俱不見火為末防風羌活甘草細辛川芎獨活蒼朮芍藥枇杷葉蒺藜金銀花五加皮白芷苦參各五錢胡麻麻黃牛膝草烏川烏白附子菖蒲各三錢五分各為末用丟子二斤去殼入瓶內以酒拌濕箬紙密包隔湯煮一日夜黑爛杵成膏分作二分每分入第一號藥末六錢第二號藥末八錢第三號藥末一兩五錢和勻糯米飯搗膠丸桐子大每服二十丸加至五六十雞鳴午夕三時各一服茶下忌勞碌房事鹽醋糟鮮海味水果辛辣之物芥朱丸二百四十一治紫黑癱爛等症青萍荊芥苦參土朱白花蛇各四兩上為末皂莢熬膏丸桐子大每服六十丸茶下毒從毛孔中出奪命丹二百四十二又名九龍丹治諸大風草烏首烏沒藥黃芩禹餘糧威靈仙蒺藜菖蒲天麻萆麻子各一兩雷丸川椒荊芥胡麻麻黃牛蒡子白花蛇赤芍全蠍烏梢蛇各一兩乳香車米各三錢蜈蚣一條羌活風藤各五兩木鱉子一兩五錢蒼朮丟子各半斤皂莢一斤銼碎無灰酒浸一夜去酒以新汲水一碗探取汁銀瓷器內熬膏丸桐子大每服六十丸茶下面足覺癢乃藥力至不日全愈活血丹二百四十三治筋骨痛甚木香乳香各一兩麝香皂角各三錢大風子四兩上為末飯為丸芡實大每服五十丸茶下加至七八十丸羌活愈風湯二百四十四治肝腎虛敗筋骨軟弱語言蹇澀精神昏倦大能安養精神調理陰陽羌活甘草防風川芎細辛枳殼熟地人參麻黃薄荷甘菊當歸知母黃耆獨活白芷杜仲秦艽柴胡半夏厚朴防己前胡地骨皮枸杞子蔓荊子各三分黃芩茯苓芍藥各四分半石膏蒼朮生地各六分桂枝一分五釐水二鍾煎八分天陰加生薑五片欲利加大黃三錢欲汗加麻黃一錢姜五片春冬加半夏夏加知母石膏秋加白朮防風通聖散二百四十五川芎當歸荊芥芍藥蒼朮大黃芒硝滑石山梔石膏桔梗甘草黃芩薄荷麻黃連翹各等分共為末每服三錢酒下如飲片薑棗煎服以渣曬乾煎湯洗浴加減通聖散二百四十六病甚者服之防風川芎桔梗枳殼石膏柴胡黃連羌活連翹生地熟地芍藥當歸薄荷甘草麻黃滑石黃芩各三錢芒硝一兩角刺二兩風藤三兩荊芥穗五兩上藥分作八服每服用水二大碗煎八分空心服日進三服五六日後方服紫花丸烏藥順氣散二百四十七初起先服二十帖麻黃陳皮烏藥各一兩殭蠶川芎枳殼甘草桔梗白芷各一兩二錢乾薑五錢為粗末煎服為細末薑湯送下三錢五積散二百四十八不拘前後皆可服蒼朮一斤半桔梗十二兩枳殼陳皮麻黃各六兩厚朴乾薑各四兩半夏二兩五錢芍藥白芷川芎當歸白茯苓甘草官桂各二兩共為末每服三錢薑湯下小續命湯二百四十九麻黃人參黃芩芍藥防己桔梗川芎當歸附子杏仁甘草石膏各七分防風一錢如中風無汗倍麻黃防風杏仁中風有汗惡風倍桂枝芍藥杏仁中風無汗身熱不惡寒倍黃芩加乾葛桂枝中風無汗身涼倍甘草附子加乾薑中風有汗不熱加桂枝倍甘草附子中風六經混淆或枝節攣痛麻木加羌活連翹
