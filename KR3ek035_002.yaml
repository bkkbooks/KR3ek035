body:
  text: 卷二六經三十六瘋總論若夫嵐瘴蒸襲日月霾光嵐瘴乃山川郁薄沆瀣之氣天道乖違則瀰漫充塞於六合之內則日月蔽其光彩如患癘風之人濕熱邪毒之氣蒸襲或服熱毒之藥久則眼目昏暗翳障注爛自然失明也龍虎驕騰波瀾泛湧云從龍風從虎乃陰陽物理之道若龍虎失職暴厥逞威則風雲倏陡電雷交掣淫雨滂沱飆颶噓吼其波濤湧躍泛濫狂越矣如風癘之人不惜身命冒犯賊邪則氣血由之而蕩敗惡證由此而變更大病既成將何救治火炎昆岡兮英華凋落火炎昆岡則玉石俱成灰燼矣煙炱狂洋草木豈能抵受枝葉焦墜根本傷殘如風病之人邪火內盛則毛髮鬚眉焦燥敗脫髓液乾枯面貌不榮肌膚黃瘁不澤矣神離元牝兮空谷傳聲老子云穀神不死是為元牝又云元牝之根衆妙之門人之泥丸丹田元神守之如元神不守則精氣離散病將生焉神既不守於宮精神渙散元氣無依矣則聲何從而響應神氣之者元神有虧橐籥關節危敗則音聲變異矣如風病之人邪火焰盛致精神散亂氣血敗亡橐籥會厭無從攝養則語言錯雜音啞呆噤之病變更健忘顛倒也蜂蠹花心而不實草木果粟之實由花以結成花之精靈乃心上之簇粉也若花之粉箱有損則不結實矣如花發時被蜂蝶之蠹殘蝕其心則不成實總結亦難肥大由此知人之元神在於精氣元神全以腎水所鍾若風病之人不惜身命恣貪色欲敗損精液如花之損心則性命不能延永鷹餒臡胾而爛腸鷹含諸禽之肉以養生不食草木之類宋王養一鷹甚愛之意其食肉則肥健日令庖人剮百鳥之肉剁成團而唼之姿其過飽肉內又以椒辣之味和之使其香而美也鷹食過甚不久腸嗉腐臭而死如風病之人宜節飲食淡滋味菜蔬調養若不謹戒而饞食肥甘香辛美味猶鷹食臡餅非惟不能養生豈得苟延殘命色如隨錦流霞邪充五內渾身遍發斑駁紅腫赤色黑色五色之紋者乃寒濕風邪毒氣流注充滿於五臟泮渙於脈絡百骸病勢已劇內形於外矣形似熏煤磊石血溢六經人賴氣血周流充潤故肌膚滑澤容貌光華若面色如煙燻昏暗或似煤炱晦黑或塊壘高低黧敗灰塵之狀此則氣血不守內液枯焦元氣泛傷於外精神敗蠹離脫榮衛大病已劇若不速救則夭折之患立至矣風病之質不過痛癢麻爛憊脹六種也古云頭面起者曰順風腰足起者曰逆風上部先見者上必盛下部先見者下必多人身十四經枝絡絲系皆環於巔頂交於百會氣血周流旦夕不息五臟之竅皆達於面故面乃諸陽之會獨能耐寒諸氣相逼故臟腑受病先見於頭面氣血皆向上領毒上出也若於腰胯之間先發者則氣血凝毒搏滯關格上下不舒腿股厚實之處不能藏蓄若先見病則氣血引毒垂下而日益深沉藥力難至不易驅伐經云身半以上同天之陽身半以下同地之陰從上發者陽中之陽氣從上出而為順攻之易散氣反下行為逆伐之難於奏效上部先病邪聚於上下部先發邪並於下丹溪云氣受之則上多血受之則下多蓋氣之性衝上血之性流下也故上多病者氣必虛下多病者血必竭風本屬陽癘本屬陰故癘瘡於下部先見易治在頸面起者必凶又有遺毒之患陽明胃與大腸無物不受曰百納之倉廩風毒之氣皆蓄於此而發如布囊盛物一有穿孔皆從而泄之風在人身亦然如有穿爛者則不能速斂毒氣漸出也導痰去濕利氣清陽針委中刺腫塊耗泄毒血治要之捷萬類千方不過如此風濕中人虛火隨起痰因火動氣滯不清腫處則毒凝聚針之使散且如有治紫雲腫塊者以小艾炷灸之火氣透入皮膚攝引邪入走路也委中穴在兩足對膝後膕中央曲䐐兩筋中即血郤穴也三稜針出血妙八風八邪穴在手足指趾本節背後交叉中虎口內直針入三分瀉多不灸經絡與膀胱經之委中同治癘風麻痹不仁攣曲無力之症蛔附輕粉砒霜切忌不可妄投參耆白朮芎歸尚且宜擇而用祛風瀉火殺蟲排毒為先補血壯元導滯堅筋相濟血足風自消氣清風自散是聖賢確論萬古之下豈能改乎世有妄醫用八將追魂方內有砒霜與土狗蜈蚣等件又有一等粗人妄用烏梢赤𧐖等蛇煅灰暗投藥中與病人服乃云以毒攻毒其害甚大古有醉仙散以輕粉為主服之或見苟愈必使毒留臟腑百節鑄痛至死不已又使腫塊痿頓蓋毒犯心經則肘膝腫大潰爛筋節脫落毒犯肝經則眉發脫落皮色放光不澤毒犯脾經則貪嗜饞食音啞眼皮坍垂失明肉堅塊瘰口喎頭暈疼痛毒犯肺經則痰湧喉痹鼻毀臭爛手足攣曲毒犯腎經則腰跛膝蹩骨節痠痛腦裂陰莖爛落毒犯胃經則渾身疙瘩膿穢腐臭癱痿脹滿或脾泄瀉痢腹痛終身為害風癘之人其熱必盛故血液乾燥皮毛枯脫若加附子川烏等熱藥猶抱薪救火人之眼毛扇掃塵埃使不入目故常閃霎那動若燥熱脫落則塵埃無所祛掃飛入目中必常揩拭漸致眼紅坍爛而成大害且虛火暴虐則真水必衰若又以烏附謬言補陽豈不助火邪而燥其陰腎水乾涸欲火熾盛以速其死又謬云用蛇蠍等藥以毒攻毒欲劫病於一時以誘財不知癩風由毒積成又遇毒藥以火濟火如寇遇夥類聚混淆反助賊邪鑽透骨髓蠹戕元命豈可用乎蓋風病血虛即陰虛庸醫擬以大補為主用人參黃耆不知黃耆乃補氣之劑服之反助陽邪而耗陰血經云血虛服氣藥則血愈虧病必日增過多則死如水在溝潭風捲必涸故血虛忌用氣藥人參益氣生津和中病後僅可服之又助太陰之火故肺熱者宜忌況多服必有參毒發喘湧痰總不如元參攝血歸元祛五臟之遊火為風科之要劑白朮調脾去濕川芎為血中之氣藥行血滯於氣分當歸為血中之主藥活血各歸於其經始治必用之為綱領古云醫風須補血血足風自滅又云醫風須理氣氣清風自去極有旨趣壯元可不痿堅筋可不攣豁痰則氣自清降火則血可養此治風三要也須戒嗜欲絶女色禁食一切動風傷血敗氣腥鮮辛甘瓜果粉面方可延生否則雖愈必發風病之人不忌毒食乃加重之端不戒女色實速死之兆故丹溪言治五人止一貧婦淡薄且寡得永天年禁戒之專也余皆不免再發不守禁戒之咎也孫真人治四五十人終無一人免於再發非真人不能治蓋無專心守戒者也其豬肉羊肉動氣發風牛肉驢肉沉疴頓起燒酒動火麵食動濕肥甘美味皆宜忌之惟鳥魚功並蚺蛇蟃蜊殺蟲最勝烏鴨涼血補元食之又助藥力凡椒芥蔥蒜薑茄大能發病猶當絶之若不嚴戒雖愈必尋毒而生疥痹蝕癬之類漸滋舉發為喪命之機藥病總說三十六種風症不過痛癢麻爛腫憊之類一百八道方藥皆排毒殺蟲補血壯元理氣之劑諸賢祕論各擅門牆自古聖賢遇病立方議論參詳各據一理癘風多種所由不一且如北人剛勇而地高燥南人風氣柔弱而地卑濕閩廣多有嵐瘴蟲毒之氣江淮常受海水寒冰之傷海島風濤山溪妖魅貽害無窮丹溪專攻外感理氣清陽利於南方東垣端理內傷導痰去濕利於北方孫真人王好古許旌陽抱朴子等或以殺蟲排毒或專補血壯元或惟調氣清神各有大意而制方無不驗然諸家各有祕旨後人若能辨症用之自有效驗須博覽各家之術約而選之定合符節如得一方便誇能治必無皆驗之理且如五龍丸有斬關奪帥之功千年藥有起死回生之妙癱爛敗絶者非東華玉髓不能復其原斑爛舛錯者舍馮夷瓊漿烏能掃其跡若合其宜如弩發機若違妄用如水澆石黃龍丸即水煮黃香丸能治三十六種大風危症烏龍丸治風症內熱痰火上攻並周身乖癩燥癢作痛白龍丸又名捕龍丸治上半身痛風極凶者花龍丸又名渾元丹治腰半以下腿膝大痛者赤龍丸即一粒金丹治痛風遍身抽掣日夜叫號者千年藥乃祖師邋遢張真人遺下平分家産方又曰靈寶千年大藥治三十六種大風十四般大癘無所不效東華玉髓乃大風子油膏治爛風瘡穢者馮夷瓊漿又名推云酒治五色疙瘩云顏麻木者若對症用之無不奏效若亂投妄用則不見功必須脈藥相配診視相參對症施治隨手獲功執方膠固彌紊何靈凡有一般症候自有一般脈色辨診不同古有形診聲診色診脈診之條欲觀其形而診驗吉凶如頭為清明之府若傾視則神將奪矣背為胸臆之府若胸曲肩垂則氣將壞矣腰為腎之府若轉搖不能則神將竭矣骨為髓之府若不能久立行動振掉則骨將敗矣筋絡為血之帥若攣曲不舒則血將枯矣此為望形之診也欲聽其音聲而診驗吉凶如語先輕後重高厲有力則外感有餘也若語先重後輕沉困無力內傷不足也此為聞聲之診也欲觀其色而診吉凶如青者欲如蒼璧不欲如藍如翠羽者生如草滋者死黃者欲如羅裹雄黃不欲如黃土如蟹腹者生如枳實者死赤者欲如綿裹硃砂不欲如赭如雞冠者生如衄血者死白者欲如鵝羽不欲如鹽如豕膏者生如枯骨者死黑者欲如重漆不欲如地蒼如鳥羽者生如煤炱者死此為顴色之診也脈經云癘脈陽浮弦關上也陰實大關下也兩寸浮而緊或浮而洪浮緩者易治洪大而數或沉實者難治脈若沉者病反在上浮者病反在下皆不治此為切脈至而診吉凶也故曰陰陽配偶方脈參詳此理通徹則藥對症何憂治而不愈哉若執一死方以治諸症非惟無益反害於人然導痰去濕如蒼朮白朮南星半夏貝母皂莢茯苓阿膠厚朴元明粉栝蔞仁胡黃連青礞石銀柴胡之類濕而膨脹痰結者非厚朴不消元明粉止可為丸服不宜入湯液濕痰成塊者阿膠專主為末服之若水煎服則臭而無功皂莢打痰從大孔出甚速銀柴胡治肺熱之神藥癘風聲濁痰臭者必用之止入丸散不入湯液若骨蒸寒熱者一見胡黃連即愈亦不入煎劑煎則無功矣利氣清陽如沉檀麝腦乳沒木香縮砂豆蔻益智遠志升麻犀角珍珠丹砂牛黃柴胡之類氣閉則陽微氣結則血匿諸香皆能開導幽微隱僻之郁通達關竅氣滯非提不起必須升麻柴胡之屬牛黃珠粉等件香劑能消氣聚之塊止宜丸散不入湯液者以火炒水煎則味愈苦令人嘔吐噦啘況有諸香不宜見火之說祛風散邪如羌活麻黃荊芥紫萍苦參風藤之類病以風名皆由風濕寒暑之感若不發散邪氣何能消溶羌活之類皆不可缺苦參最殺風癘之蟲瘡癬皮肉之蟲立死服之五臟蟯蟲立去必用藥也補血生津液如當歸元參紅花茜草根紫草血竭鹿茸夏枯草桑螵蛸原蠶蛾生地黃之類元參去五臟之遊火攝血歸元紅花去死血生新血為治風必用戴元禮云夏枯草為血虛所宜桑螵蛸之補陽填精比於人參有霄壤之功晚蠶蛾有再生精髓之捷血竭乃去積瘀血作痛之卒徒故多用之蕩滌積滯如代赭皂莢雷丸蜂蜜人牙千金子人中黃之類油膩脂膠之積淤腸胃非皂莢不去代赭石名血師專排血積淤凝善活血不使攣曲雷丸去積殺蟲止可用於男子婦人服之必脹悶腹痛發昏甚則顛呆痰涎湧塞故男子用雷丸婦人用皂莢劫殺蟯蟲如錫灰黃芽雄黃鶴蝨枲實鵝翎灰之類黃芽糞中蛆也於四月內未食茄子之前收者方好以濃茶滷養淘炙香方無油泛專祛蟲積鵝翎灰最殺風瘡中蝕蟲若皮內瘡疥蟲非此不除麻瘠癱瘓如菖蒲天麻萆薢防己秦艽豨蘞胡麻香蛇漏蘆石斛蒼耳草白蒺藜之類血枯必痛血凝必麻須用補血逐血之劑故萆薢之補陽菖蒲之升陽豨蘞草乃風病元氣虧乏之聖藥非止癱瘓者用之筋攣肢軟如苡仁牛膝杜仲續斷狗脊萎蕤白生蛇仙靈脾之類風注四肢非萎蕤不能上下左右搜逐又能消爍諸般毒物陽痿筋攣非仙靈脾不能興起乃大補元陽之藥實救本之妙藥也愛食瓜果者須倍麝香耽嗜面檗者必求枳椇曾服汞粉定用鉛磁若進毒藥急行和解參耆之性不及升柴此特大略博而約之治風之法先散寒邪次攻蟲毒次調元氣次養陰血待風散蟲死血足氣清之候再拔瘡穢舒其筋而伸其攣滋生毛髮則病愈不發補益之藥終身服之不可止乃不刊之祕論也若欲速不分次序則隨得隨失變駁反掌非惟無益必反害之如升麻能使濁氣從右而上散柴胡能合清氣從左而上達參耆惟能助氣而反附陽邪以損陰血風癩以養血清陽為要故參耆不及升柴之提散調達開導肌表也麝香能消諸瓜果之毒發渴者乃瓜果之積用之即消枳椇即金鉤樹子能祛酒毒好酒之人宜服之黑鉛磁石花椒專收輕粉水銀之毒恐庸醫暗投故宜服之以免發毒此用藥之大略也近世專用大風子為良方不知此藥性猛大熱有燥痰劫血之迅力制煉不精則病未愈而先失明矣大風子即海松子又名丟子因其專能治風而名也生於東海日出燥炎之地故性大熱能直入肌骨殺蟲祛濕夷人稱為丟子當果食之以治百病蓋海島之俗食生物者腹多蟯蟲之毒服此以蕩滌之如閩廣人食檳榔以御風瘴也其肉上白膜最能損目其油最能敗血如生食之傷人臟腑其性怕醬見醬物即消之無用故服此者必忌醬若得麻腐與之同服則功愈勝須專門用之制度有法則功勝於諸藥若無傳授而道聽妄用非惟無功反生他害丹溪云大風子有燥熱之毒能敗血動痰損人之目信不誣矣且據富翁陳善長患風年久求豫先君治之先君思善長耽於酒色日不間斷必難治固辭不藥善長密賄豫家老奴盜傳制大風子之法善長依法制度三年共食大風子肉七十餘斤其病脫去絶無他患一日持禮幣至豫家謂先君曰昔年求治力辭何也先君甚赧顏厚謝老奴而去始知盜方之弊想風病損目難歸咎於大風子蓋世之不食大風子而瞽者甚多後人不可泥於紙上之語始以湯藥宣暢次以膏酒灌融丸散調護王道之常風癩之藥煎劑奇方最能速效逐散風邪通暢脈絡無留毒之患第恐蕩敗脾胃故不宜久服一見病勢稍緩即進丸散以厚脾胃其豨蘞苦參蒼耳八寶歸朮丁公藤等膏捷於卻病補養但恐傳授無修煉之法其藥酒雖人喜服切不可施於初病之時且風疾初起病尚點滴塊瘰未曾散漫若即用藥酒追排氣血領毒遍透脈絡則遍身皆病難治矣須待病愈之後防其再發宜藥酒使藥力鑽透肢體把截毫竅基固神堅邪毒不能再犯也其腦麝牛黃金石香料不入湯液又忌見火惟和丸散服之功力合宜而順故治風者先須湯液次用丸膏愈後方進藥酒為治法之序世有妄徒盜習火劫蒸燒之術愚人爭赴戕害深可痛也夫風病根於臟腑既發於外其勢已減何又煨逼使毒氣復入假火為禍暫雖少爽禍不旋踵風癩之病穢積毒先傷臟腑延注筋骨譬如寇入驅出即禍減追上為上何故又加蒸尉劫之復令毒氣回伏膚腠潛入肌脈假火鬱之勢流蠹既開之孔竅仍傷臟腑耶且人身毫髮孔竅一見火氣百孔皆開何氣不入舊邪未息新邪又入初則毒氣御火暫離肌表必然皮毛顏色頓改骨節酸折疑是愈而爽快愚人喜以為美非吉兆也乃新舊邪毒入鑽之故為加病之漸耳夫病人血氣已弱再犯火毒則氣愈敗血更衰津枯骨燥若至二七日外火尉濕熱之氣在內尋注經絡充蠹臟腑必使皮肉堅硬而痠痛瘦弱無力精乏目暗肢軟足蹩步澀再不避風寒戒酒色必至腐爛失明矣宜速解救以免大害且風蟲因內熱而生復得火濕愈加滋蔓仍傷髓液至一百二十日後其火鬱濕熱之氣流遍周身病勢反凶於舊急宜用解藥掃拔禍根多有氣血衰弱者隨蒸而斃人猶不畏何哉若未曾服藥便用蒸尉則驅毒氣深入骨髓淆蕩血液若已服藥既攻毒氣欲散烏再復邀郁聚初治行之使毒氣勝於正氣禍又旋踵後治行之使毒氣入於新元禍仍僭亂急則急危緩則緩害戒之戒之故丹溪云必先殺其蟲瀉其火然後生蓋涼血祛風通滯降陽升陰雖治法頗多大都不外乎此夫丹溪云尚如此後人何可用蒸燒之劫而害理殃人乎點刺鋒鐮慘楚何益針灸熏洗緩泄還宜凡風癘所起之處每難全愈欲其全愈必追毒並歸於此然後以藥點之使爛而可跡熄根滅也若病未愈不可周身塗點其點藥之性熱過於火毒過於亢若點遍身則熱毒圍攻焉能當之又每有妄徒以針刺破皮肉用醋墨塗之使爛妄言攔阻病勢不知病根鑄於腸胃年深發見於肌表先從髓液透出豈可於皮外刺爛而能阻之乎空受痛苦而結痂痕疙瘩使形醜貌陋其病反加未見毫釐效驗其或濕癢痠麻腫塊皮肉脹大血死漬實者可以鋒鐮敗泄如紫雲白癜血癬等症可以小艾炷團圍灸之使艾火引毒漸泄雖疼痛一時亦能提散毒氣若干風痹燥之症氣血尚且不足烏可又行鋒刺愈加耗竭肌膚之間全憑血液轉使筋枯力乏手足不能運用其皮膚麻痹者乃血液虧損之故內頻服藥外頻熏洗內外應施引其經絡之間新血充足氣脈漸漸榮活而愈矣切不可驟用點刺鋒鐮暴虐慘酷剝害膚體況風癩非一時可愈者總不如令其服藥緩緩奏功為上且風癩之人氣血必衰治風癩之藥無非克伐迅劑治之將半即宜用補劑扶其根本不可伐盡氣血致津液乾枯形神憔悴而損遐齡用藥尚然豈可妄下針鐮霸道之毒手以速其死乎癩症一十四種六經所屬大風症名考究諸書悉無遺失病源云風癩一症輕重之別耳其害則一也癩愈形猶可復風愈元氣難全癩死者少風死者多大都皆非善症轍跡一類曰火曰蟋蟀心之癩也火癩此症初起如火灼之瘡大小不一或如癬皮裂斷肢趾愈又復發由心臟受毒七年病根方盛眉睫落大勢成手足痿又有一種遍身點滴紅紫生於皮膚之上形似瘢痕之狀不過十數日漸自散去或五六日亦自散復結心毒生瘡不能速愈亦能傳注於人蟋蟀癩此症乃火癩之後餘毒內結變成形如蟋蟀蟲紋內泛鑽齧百節諸竅皆欲出血額爛鼻朽口唇毀斷齒牙脫落癱瘓難動或時驚跳戰兢多懼或眼赤爛淚疼乃心火焰烈也曰木曰風肝之癩也木癩此症初起如蟲癬之狀大小不一其色赤白不一或連錢高低不定俗稱棉花瘡久則連片腐爛腥穢眉睫落面目癢愈而又作或去或來無時定息三年始成大害肝敗難治又有一種如棉花之核其粒高起硬㾦者火變成蝕癬不愈風癩此症乃木癩之後毒蓄肝經則四肢骨節筋骱掣痛甚者叫喚不能轉側皮毛枯槁肘膝大小狀如鶴膝白虎風腐穢癱瘓聲變形異或結於脅肋腹肚上爛至腸胃或爛去耳𦗴皆癩之毒也曰土曰䖲脾之癩也土癩此症初生塊瘰先發漸熱或嘔吐或黃腫大如雞卵小如彈丸或如麻豆穿即成瘡膿滋腥穢由脾受賊邪炙爆毒味禽獸魚鱉久而成之急治則可若至六年病成禍速人聞其氣息即染成病遺害甚大䖲癩此症乃土癩之毒潛注脾臟流於四肢則垂重難舉手足肘膝腐爛膿血臭穢或指趾毀落腫大如車軸癱痹注爛直見筋骨痛憊而死或發於胸臆肋背先腫如痞後又穿爛日久叫號刺痛而死曰金曰面曰白肺之癩也金癩此症初發如楊梅之狀上無蓋殼內泛碎肉出紫赤色爛花凸起儼若楊梅由毒入肺經不久眉睫脫落三年鼻柱崩倒眼翻唇斷此乃天付之咎陰空神祟之禍定有遺毒久治方可挽回天意不比他種可以速愈面癩此症乃金癩既愈餘毒難消蠹存肺臟致生如面細蟲舉體艾白斑駁周身或如痹癬儼如泥壁風狀惟外加熏洗則能取效白癩此症乃寒暑濕熱之氣邪毒釀襲瀰漫肺竅積生惡蟲蠹齧肺管使聲破目暗肢體頑痹骨骱中如火燃心胸燥熱手足背膂拘緊肉如剜劈以致身體手足癮疹鼻生息肉氣塞不通濁涕流涎山根高腫腦門時痛或目生白翳無光多為鼻癰外不發瘡人皆不識此癩故治之無效曰水曰雨曰烏腎之癩也水癩此症必先得水病因而停留又為風濕觸激或生陰莖疳蝕或陰囊兩傍發起腫塊漲泮腿腰形似橫痃寒熱交作脹痛難舉上下漸大如潰即變成瘡遍身腐爛一年眉發落病劇難治雨癩此症乃水癩愈後餘毒在腎以致生蟲其毒泛注周身生五色斑點乖癩眉發脫落陰莖酸爛或陰囊破損或陰莖蛀干皮肉流膿漸漸爛去輕則為下疳魚口等瘡久則唇鼻𦗴皆爛毀腐腥臭與廣症同烏癩此症乃邪毒入腎變生惡蟲餐齧精髓下虛無救若胸脅肋腿臀股間生如李奈桃梅狀顆塊軟泡穿爛腐臭難治或如漏瘡或癮疹赤黑手足頑痹針刺不知或腳不能踏地或飲食時則開口而鳴或兩肘如繩縛或穿處則腐爛流膿黏著即生腐瘡或皮內淫癢怕見風濕或平時骨間淅淅酸響皆當大補氣血曰酒曰麻胃之癩也酒癩此症因酒色之時汗出體虛迎風入於胃腑遍身生瘡大者如錢小者如豆不赤不白灰黃變形膿黶黏堆或有不飲酒之人素受寒濕風邪微見酒氣汗出迎風亦然或有好剛性急躁暴色欲過度之人多犯此症久則眉發脫落令人惶懼惟難治麻癩此症由酒癩之後毒留胃腑遍生毒瘡如癬疥淫癢難忍或手足掌背頑痹不仁黑白不等形如雁來鵝掌風之狀或如牛皮血癬時痛時麻蟲蝕脾胃或發內痔頭硬而碎形如蟺頭遍身皆然觸之則大痛冷汗一二時而息癘症總論夫治癘之方與風少異丸散點擦各有祕傳切忌熏鐮輕粉凡患風癩決非一種或二三種者有之甚至有四五種者先傷一臟則注各經故年久者面色變駁病勢愈甚且如風病先染冷麻而變紫雲黑色者有之先染痛風而成半肢軟癱者有之先染火癩腫大穿爛手足廢弛筋骨痛痿者有之故治難以一定方藥不能驟攻愈一症而他症變駁反見其勢凶也又有風癩同患一人者若先染風病後患癩症曰風癩先患癩症致成風病者曰癩風等最多風則先治其癩癩愈方治其風風癩則用治風之藥後加治癩之劑此是大意治至半愈即服解毒大補氣血元陽之劑勇進三年方可經云逐五臟之邪鬼門開方死瀉膀胱之濁穢淨腑始潔倒陽絶欲勉強矯揉內養靜修仙機妙運魂魄尸神之竅曰鬼門掃蕩臟腑之穢惡則清氣得以升降運育自然形容潤澤若穢濁之滓沉滯下元則九竅不清十四經晦塞祛滌其穢則源清流還陽氣舒暢而精神爽悅上下清明矣故制烏龍丸之劑一進以靖內汙之濁風癩之人五火俱盛陽事易舉若不愛命而近女色則服藥無功效欲其不舉不得已以藥倒之病雖可愈又恐斷人生育之根陰陽相關若已有子者則全現在之命絶其喪命之端未為不可若未有子嗣則宗祀為大切不可行之然倒陽之祕有用藥者有用功者妙在心傳此理非庸人可知若病人聰達授以元門內事靜修導引之功使內固丹基外安神役再進藥力並攻則其壽無疆此方得英敏之士方可行之若愚妄利徒非惟不能盡術反使冒瀆聖賢再針灸之法前後無忌熱藥止可用於愈後除根點刺之端始終不可用若鋒鐮一有不當則刀口引風入內令人殘痿枯敗戒之戒之籲醫司民命藥有良毒不讀方書懵然無據生死關係陰陽非輕患風癩者當保惜天賦毋從愛憎譭譽之口自宜揀擇醫之良拙治風癩者當敬畏天譴毋貪欺詐苟且之財害人之命人患風癩命懸旦夕求醫調治死生攸關務得高明仁厚之人方可倚托往往見人不擇醫工之精粗但見其自稱矜今誇不讀方書盜襲死方欺罔狂侫惟貪輕任或倩人妝拔薦點巧譽之言即從而治之豈不殺人乎且風癩之科一症有一方其人止學得一二方豈能悉治諸症如紫雲之藥不能治爛風痛風之藥不能治癢麻漏蹄之方若治癱攣則反為害庸俗何知之病者既欲延生而求醫若不揀選實輕命也痛哉惜哉夫癩風乃十三科之首此論亦十三科中妙訣反覆精研不為不備後之君子得之則瞭然無所窒礙矣夫城池受困於寇即如人身受蠹於風癩形質一也以兵攻賊如以藥攻病籌猷一也寇不退則城池崩陷風不消則元命傷殘患害一也欲救城池必運神機欲救人命必行妙術妙用一也所論風癩之理皆明是書所治風癩皆備此外更無遺隙然用藥如用兵保黎如救命療人之病以復元命能解城之圍以活蒼生輕重之殊實元元之妙法深淵之大澤也故曰解圍元藪云
