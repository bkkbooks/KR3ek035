胡麻牛蒡子各十兩當歸紅花川芎各四兩鬧羊花四兩酒蒸曬二次上為末酒糊丸桐子大每服百丸早晚茶下腹中響動不安兩三時即定參靈丸七十八治大風腫爛癱瘓抽掣困頓大有奇功苦參一兩荊芥防風牛膝威靈仙各四兩蒺藜胡麻各一兩丟子八兩鬧羊花五錢上為末黃米糊丸桐子大每服六十丸白湯下日進三次烏龍丸七十九治癩風遍身瘡癬瘍疥腫爛臭惡服此消風散熱利膈化痰又治肺氣不和能推陳致新去腸垢滌臟腑穢毒有大功肥皂角刮去皮筋子水浸捶爛絞去渣取汁入瓦器煎膏用黑醜末共搗為丸桐子大每服五十丸白湯下如氣虛者服二三十丸無病之人氣若實服一兩利用三五次不傷正氣身體輕健肌膚光澤永無風痰疥癬洞虛丹八十治惡風麻木走注抽痛者藁本天麻川芎細辛各一兩五錢牛膝羌活各三兩大風子四兩蟬殼胡麻防風獨活殭蠶荊芥蘇木風藤石膏蒺藜山梔芍藥菖蒲石蠶黃芩連翹草烏紫萍升麻紅花麻黃白芷石斛當歸威靈仙各二兩上為末酒糊丸桐子大每服百丸用羊躑蠍草根一斤四兩打碎以酒二十斤煮去渣每以一杯送下一月病愈忌食鹽物清平丸八十一治大風中風跌蹼打傷喎瘓等症有歌為證天生靈草無根斡不在山間不在岸始因飛絮逐風飄泛梗青青浮水面神仙一味去沉疴採時須是七月半癩麻疼痛立時消寒熱瘡痍及癱瘓任從癲癩暴中風些小微風都不算黑淋酒化服三丸鐵漢頭上也出汗七月上旬採河中紫背浮萍曬乾為末每斤加草烏葳蕤風藤麻黃各二兩麝香二錢共為末蜜丸彈子大以草烏煎酒磨服一丸重者以烏頭煎酒磨下輕者以黑豆炒香烹酒磨服豨蘞丸八十二治肝腎風氣四肢麻痹骨節痠疼腰膝無力癩風痿爛濕痰中風口眼喎邪手足屈曲癱瘓等症於五月五六月六七月七等日採豨蘞草葉拭去毛沙土曝乾以老酒拌蜜酒層層和灑以柳木甑蒸透曬乾共九次加乳香沒藥沉檀降木真麝等香當歸血竭各等分共為末蜜丸桐子大每服三錢無灰酒下神效胡麻丸八十三治大風大癘中風乃風科之妙方胡麻一斤苦參皮五斤酒浸七日荊芥穗四斤豨蘞草葉淨三斤蒼耳草葉淨三斤紫背浮萍二斤蒸透曬乾先將豨蒼二味蜜拌蒸一伏時曬乾後共為末酒糊丸桐子大硃砂為衣每服百丸茶酒俱可下日進三次獨聖散八十四治鼓槌風手指攣瘸足趾腫爛脫落腿肘曲折腫痛難忍萆麻子肉二兩碎者不用黃連二兩同貯瓶內加水浸之春五夏三秋七冬九日取出每晨朝東南方以瓶中水一鍾吞萆麻一粒漸加至四五粒若微泄無妨如手指足趾節間腫疼諸病即愈戒食動風辛辣毒物跨鶴丹八十五治雞爪風五加皮海桐皮川烏川芎赤芍各五錢乾薑肉桂各一錢上為末每服三錢用水二盞將青錢一個入青油浸三日同煎服靈芽芷珠八十六治爛風痿頓臭惡疙瘩人蛆以水養淨再以濃茶養三日夜炙香為末每兩加麝香一錢酒糊丸彈子大每服一丸熱酒磨下眩瞑周時自醒病若脫去重者五七丸全愈雄漆丸八十七治爛風瘡穢臭惡者透明雄黃水飛淨八兩淮熟地八兩乾漆灰一兩上為末醋糊丸桐子大每服七十丸酒下服藥一料全愈蓬萊棗八十八治癱瘓痿爛臭惡困頓者北紅棗一斤取肥大不破者五臺草取自然汁十碗一名貓耳眼又名濃灌草透骨草即馬鞭草左纏藤即金銀花夏枯草透天龍即茜草土風藤即九龍草蒲公英各取汁一碗黃花根一兩上各草於二月中旬收採加白酒漿二碗入砂鍋內文火慢煎汁盡用千年葉川椒煎湯洗去棗上泥陰乾如病人手指攣瘸屈倒五年者服二斤十年者服四斤二十年者不治服時要在靜處避風端坐養神先吃一個三日外增三枚五日外增五枚常服之仍以扁柏川椒湯洗手外用沉香麝香末為衣更妙其煮過棗汁為瘡疽圍藥極好或以金銀花藤蒸曬為末和丸外科服之甚妙風科服之亦好聖散子八十九治諸風痿困攣曲臭惡危爛者鬧羊花根老酒拌九蒸曬缸岸即坑垽要多年露天者醋煅三四次各一兩人牙炙黃雄黃水飛各八錢牛黃一錢二分蟾酥三錢硃砂五錢麝香一錢上為末每服四分沙糖調溫酒下花龍丸九十又名混元丹治風濕腰背以下腿股癱瘓寸步不能日夜抽掣伏床不起蒼朮四兩黃柏酒浸炒靈殼酥炙朱膝當歸萆麻防己茄根皮各一兩上為末酒糊丸桐子大每服百丸薑鹽湯下白龍丸九十一又名輔龍丹治風濕腰跨以上肩背大痛肘膊僵軟匙筋難舉傴僂脊高乳香沒藥川烏草烏地龍南星各等分上為末酒糊丸每服四十丸或酒或荊芥湯下服至四兩除根外以石楠葉煎湯洗沃香身湯九十二治大風腥臭穢人不能近者白芷香附當歸桂心檳榔益智甘松各三兩檀香二兩麝香韶腦各五錢木香沉香松子各一兩五錢香蛇二兩上為末甘草膏丸桐子大臨臥含化五丸大能祛症大衍丸九十三治諸風癱痿變形脹腫困敗者羌活當歸白芷防風粉草連翹熟地牛蒡子殭蠶各二兩蒺藜六兩元參半斤酒拌曬苦參皮一斤酒浸九蒸曬上為末酒糊丸桐子大每服百丸滾湯下日進三次外用甘草黃柏荊芥苦參槐頭椿頭防風大風子殼蔥煎洗浴仙花膏九十四治大風惡症神效鬧羊花八兩酒蒸九次蒼耳子八兩炒敗龜板煅白如霜二兩番木鱉醋炙二兩上為末用蜜一斤熬去水氣調之入竹筒內挂當風處病人初起酒服五分弱者服一二分不飲者沙糖調下水制黃香丸九十五又名黃龍丸治諸風危困無藥可治將斃者舶上硫黃黑色者曰雌黃色者曰雄各半打碎滴花傾入釅醋內取出裡面之油取淨者一斤用竹筒一個削去青入硫在內以蠟封口投入無水糞坑中浸一年取起放長流水中四十九日明亮松香溶化加燒酒煮六七沸傾入冷水內抽扯去內苦黃味再煮再抽一連七次拔淨細白無腳方用三兩茅朮米泔浸刮去粗皮用白淨者一斤紫檀香茅香俱不見火白膠香川烏泡去皮川芎各四兩惡實頭末草烏炮去皮明天麻各三兩一方加地龍二兩名黃龍丸上為末陳皮糊丸梧子大每服五十丸滾湯下如皮膚髮熱加番木鱉五錢以麻油煮熟忌豬肉房事治鵝掌風雁來風方九十六銀杏肉打爛搓擦如干撲去渣不可水洗再加冰片麝香各三分研勻桐油調塗上以艾火熏之又方用真平胃散桐油調塗於炭火上熏之頻塗頻熏又方用烏骨白雞勿使犯雌另蓄一處收其糞曬乾加入蛇床子末煎湯入瓶內熏之待溫即洗一方加雄黃皮硝尤妙又方用蒼朮艾煎湯瓶內熏之俟溫洗之又方水銀三錢鉛二錢化開投入水銀為末用硫黃三錢研細將茄蒂蘸擦一法以滴滷洗二三次則愈白癜風方九十七用麻油半斤生柿柁兩個打爛和勻入鍋內熬黑去渣點在患處自變好肉三分散九十八治諸惡風痿困癱爛危篤者鬧羊花酒拌九蒸曬用生漆每兩加樟冰二錢雄黃二錢攪勻隔湯燉化拌蒸曬乾又以茜草根搗汁拌蒸曬乾為末每兩加雄黃三錢麝香五分蟾酥二錢研勻每服三分沙糖調溫酒下半日不可見風四物湯九十九川芎當歸白芍大生地人參敗毒散一百人參羌活獨活前胡柴胡荊芥防風桔梗川芎枳殼茯苓生甘草生薑大棗補中益氣湯一百另一升麻柴胡人參綿黃耆當歸茯苓白朮炙草薑棗
