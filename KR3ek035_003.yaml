body:
  text: 卷三六經湯丸祕方心風先傳肺經外證損目煎方一防風細辛南星白茯苓薄荷大茴香桔梗山梔各二兩當歸首烏羌活牛膝牙皂蟬蛻枳實元參川芎附子各一兩加薑棗水煎服十劑如有痰再加薄荷一兩均作十服丸方二羌活防風黃連柴胡獨活全蠍去頭足用土炒白芷各一兩當歸穀精地骨皮各二兩白茯苓芍藥熟地茯神遠志各一兩五錢乳香沒藥檀香各六錢細辛七錢殭蠶八錢麝香三錢甘菊二兩訶子肉八兩風藤二兩上為末蜜丸或黃米飯丸如桐子大飛硃砂為衣每服三錢用前煎藥送下日服三次肝風先傳脾經外證發紫泡煎方三防風八兩元參當歸牛膝柴胡芍藥蟬蛻各一兩胡麻草烏各四兩白芷官桂各一兩五錢有痰加乾葛二兩均作十服丸方四防風荊芥葛根丟子各四兩胡麻當歸草烏元參麻黃附子各一兩白蒺藜乾薑皂角桔梗牛膝川芎羌活甘草各二兩全蠍一兩五錢苦參五兩上為末蜜丸桐子大青黛為衣脾風先傳腎經外證遍身頑癬或時刺痛煎方五防風當歸風藤各三兩元參川芎甘草節枳實陳皮白芷桔梗枳殼烏藥各一兩五錢木香一兩有痰加半夏一兩五錢均作十服丸方六元參枳實當歸陳皮白芷胡麻乾薑厚朴滑石各二兩防風八兩川芎甘草殭蠶芍藥麻黃草烏蟬殼羌活全蠍木香各一兩上為末蜜丸用鬱金黃柏末為衣肺風先傳肝經外證眉須鬢髮焦脫煎方七元參川芎知母滑石半夏蒺藜牙皂黃芩牛膝胡麻羌活乾薑桔梗木香當歸各二兩有痰加防風三兩上均作十帖丸方八當歸牛膝防風蟬蛻獨活各四兩羌活胡麻石膏首烏各三兩荊芥六兩殭蠶全蠍南星白芷各二兩元參五兩上為末蜜丸滑石半夏末為衣腎風先傳心經外證腳底穿爛煎方九甘草麻黃防風羌活薄荷茯苓桔梗各一兩川芎當歸厚朴半夏知母黃柏各二兩獨活大黃苦參各四兩滑石五兩有痰加石膏三兩均作十帖服丸方十桔梗川芎白朮丟子各四兩當歸甘草川朴木香乾葛各一兩牛膝八兩人參乾薑白芷全蠍麻黃各二兩天麻一兩五兩白花蛇五錢上為末蜜丸用百草霜為衣胃風遍傳五臟外證渾身潰爛煎方十一羌活澤蘭藿香各二兩蒺藜柴胡防風細辛白芷薄荷各三兩荊芥四兩獨活木瓜牛膝連翹黃芩生地山楂各二兩五錢菖蒲枳實陳皮各一兩麻黃一兩五錢有痰加象貝母石膏各一兩均作十劑服丸方十二荊芥二兩蒺藜天麻白芨各一兩五錢獨活柴胡羌活木瓜各三兩風藤皂莢厚朴前胡象貝母蒼耳子金銀花各一兩五錢麝香二兩乳香檀香各三兩紫背浮萍四兩上為末蜜丸甘草大黃末為衣風癘各方通經利竅湯十三三十帖按日服之風癘初服藥起須以此開經絡第一日大黃荊芥桔梗歸尾黃芩各一錢羌活防風連翹各一錢二分防己白芷各八分牛膝七分甘草五分第二日大黃羌活防風桔梗各一錢白芷防己歸尾獨活荊芥牛膝各八分甘草五分第三四日羌活桔梗防風黃芩各二錢白芷荊芥防己獨活牛膝歸尾各八分甘草五分腹中有積作痛加製大黃一錢心痛大腸不利則用生大黃一錢第五六七八日羌活獨活防風荊芥各一錢歸尾芍藥防己連翹黃芩各八分甘草五分如腹痛大便不利加大黃一錢第九日大黃荊芥羌活獨活防風川芎各一錢當歸牛膝黃芩白芷桔梗各八分甘草五分十日至十八日同惟大黃用二錢十九日大黃黃柏連翹羌活苦參荊芥黃芩各一錢黃連防風防己甘草當歸各八分第二十日如有白蟲從大便出藥與十九日同如無再加白醜末虛弱者不加二十一二日黃柏炒大黃蒸苦參羌活各一錢連翹防風黃芩牛膝防己獨活各八分甘草五分黃連一錢五分二十三四日芍藥羌活黃芩荊芥牛膝白芷大黃連翹各一錢獨活當歸防己桔梗各八分甘草五分二十五日元參連翹獨活當歸防己桔梗牛膝芍藥各八分防風大黃各一錢黃連七分草烏一錢川芎甘草各五分二十六七日同上二十八日草烏芍藥羌活荊芥防己各一錢川芎當歸桔梗牛膝白芷苦參防風各八分甘草五分二十九三十日同服此倘痕色不退再服此方三四劑上藥三十帖俱水煎早晚服溫酒同下如腸澀加大黃一錢白玉蟾遺方十四治痹麻諸風癱瘓爛攣腫危並大麻雞爪嚲曳螻蟈冷麻等症防風黃連黃柏苦參牛膝草烏麻黃紫風藤荊芥穗蔓荊子升麻川芎大黃當歸藁本山梔上水煎服大劑十服內竅俱通其外油光紫黑疙瘩皆退隨服丸方白玉蟾丸方十五胡麻川牛膝木瓜山梔黃柏蒼朮明天麻白蒺藜各五兩五加皮風藤羌活苦參當歸各十兩水銀水飛朱車米麵包煨麝香三錢香蛇一兩代赭石醋煅二兩新鮮丟子肉四十兩此即木楓子肉朱將大楓子肉用水二十碗煮至二三碗濾干入臼搗爛以朱汞赭米四味共研不見星收瓷器內用香燭花果供於八仙元檀神前忌婦女雞犬觸汙再將各藥末稱準以煮大楓子汁加陳米糊丸如桐子大於卯午酉時各服三錢酒送下疾輕者只服二錢或一錢五分至四五日反覺病凶口內齒根麻木精神恍惚過後漸痊面色紅潤再不沉重惟要戒守則永不發白玉蟾末藥方十六治癱瘓軟痿冷麻困痹大有奇功草烏白朮硃砂細辛雄黃白芷防風蒼朮各五兩麻黃八兩川烏一大個上為末每服一錢用蔥白頭七枚陳酒一碗煎滾送下重者用之先以藥湯洗再進此藥臨臥服汗避風白玉蟾浴湯方十七將各藥燒湯洗滌如爛者日洗一二次蒼耳子防風馬鞭子草紫蘇苦參金銀花白芷遍地香澤蘭白玉蟾蒸法十八先以湯藥洗滌再用蒼朮一斤煎酒五六碗將地鋪稻柴再用藁薦礱粳四五斗米醋十餘杓拌勻蒸熱鋪在薦上用席蓋粳令人睡之上以棉被蓋之待出臭汗毒氣已盡漸去衣被須於無風處蒸之白玉蟾擦藥方十九白芷草烏南星半夏丟子杏仁白芨白蘞蛇床各等分上為末手足及遍身有腫塊成瘡或冷麻者以生薑蘸藥擦之待皮活病退方止當先用洗法次服末藥次又行汗法隨時擦之隔三日再洗再汗再擦一連五六次如病不減不得已方行蒸法卻之但丸方要服數年大瓢李遺丸方二十治哉蠔蛇皮刺風癢風雞爪疙瘙歷節等風並麻木冷痛手足屈折痛癢不知痿憊癱瘓腐爛危篤等症琥珀五錢天麻一錢真珠冰片硃砂膽星血竭殭蠶各二錢蟬蛻細辛各四錢川芎羌活防風各六錢遠志五錢茯神八錢犀角三錢五分菖蒲六錢五分鐵粉三錢六分雄黃牛黃各五錢六分蛇含石醋煅四錢六分白附子五錢二分半夏四錢四分麝香蘆薈烏梢蛇各五錢五分牙皂一兩丟子霜八兩青礞石煅四兩上為末酒糊丸桐子大每服一百丸空心酒送下如覺恍惚困倦麻木委厥者以豨蘞蒼耳金銀藤煉膏服之大瓢李末藥方二十一治男婦癘風癱瘓口眼歪邪面如蟲行身痛如切或皮肉淫癢難忍久而手足反張當歸防風川芎白芷細辛麻黃荊芥全蠍天麻藁本雄黃羌活甘草各五錢硃砂人參白花蛇大茴香兩頭尖各三錢香蛇七錢川烏草烏蒼朮各四兩上為末每服五六分漸至一錢臨臥以無灰酒調服忌一切熱物或有汗麻木身癢乃藥力至也服此後用鳳仙花梗煎湯洗浴汗出為度人參固本丸二十二治手足攣痛晝靜夜劇歷節大風腰腿痛口眼喎邪白朮四兩沒藥沉香各五錢天麻一兩青皮一兩人參一兩白芷一兩蒼耳子二兩烏藥三兩紫蘇一兩五錢甘草五錢上為末酒糊丸桐子大每服百丸用後方煎藥送下煎方二十三白朮桂心防風人參柴胡甘草川烏當歸芍藥赤茯苓薑棗煎服孫思邈真人煎方二十四治核桃紫雲等風防風苦參薄荷芍藥黃芩連翹山梔知母柴胡大黃麻黃天麻半夏花粉甘草紫蘇香附白芷當歸羌活加細茶一撮煎服五六帖退斑十服效臨臥服忌見風孫思邈真人丸方二十五此方甚妥尚可量症加藥牙皂苦參蒺藜防風當歸荊芥穗蔓荊子牛蒡子胡麻各一兩黃柏三兩白花蛇丟子各四兩麝香二錢上為末黃米飯丸桐子大硃砂為衣每服四十丸日服三次清茶送下忌食鹽物止食淡鴨妙邋遢張真人靈寶千年大藥二十六治三十六種大風後人稱平分家産方羌活蒼朮烏藥風藤防己白芷防風大黃五加皮獨活藁本桔梗草烏柴胡黃芩明天麻細辛甘松蔓荊子白蒺藜川續斷芍藥南星大腹皮皂角刺薄荷各三兩槐角荊芥升麻各五兩紫萍鬧羊花各二斤麻黃十斤天雄一斤當歸八兩苦參皮二斤紅花元參各六兩仙靈脾萆薢各三兩草烏頭四兩用陰陽水各一桶春浸五日夏三秋七冬九煎去渣煉成膏人參白朮沉香川芎木香乳香牛膝紅花磁石醋煅七次沒藥香蛇血竭松脂薑蠶檀香安息香雲母粉降香鵝管石蓯蓉各一兩茯苓雄黃砂仁青礞石萎蕤胡麻各二兩蟾酥麝香各五錢冰片二錢花蛇一條人牙炙黃香五兩上為末以前膏和丸彈子大硃砂為衣金箔包裹遠年病服十丸近年病七丸用麻姑酒磨服汗出則病愈方中若加桑螵蛸原蠶蛾末各一兩五錢尤妙神效奪命還真丹二十七治三十六種風如癘麻嚲曳大麻啞風癘風立效全蠍殭蠶黃芩陳皮熟地肉桂生地蔓荊子地骨皮黃連甘菊防風茴香芍藥知母枳殼柴胡甘草石膏當歸半夏各一兩明天麻木香川芎藁本菟絲子白朮人參獨活各一兩五錢羌活三兩桔梗麻黃薄荷各二兩五錢細辛五錢蛤蚧一對酥炙茯苓二兩上為末蜜丸彈子大金箔為衣每服一丸細嚼中風癱瘓大風癘病茶酒下遍身筋骨痛及心氣痛不省人事熱醋湯下頭風暗風茶下驚痛口吐涎溫酒下婦人胎前産後經水不調香附湯下冷風寒濕氣頓抽掣走注叫號日夜不安黑豆炒焦烹酒下又有一方加麝香牛黃冰片更妙車華玉髓二十八尹蓬頭真人傳以丟子油為君丟子生東夷島故以此名大風子依法取油四兩沒藥滴乳血竭各二錢牛黃五錢麝香五分阿膠一錢琥珀珍珠各三錢雄黃五錢地龍火炙去土七錢冰片三錢芒硝八分上研末隔湯化油藥攪勻每服一錢內熱者柿餅湯下內寒者花椒湯下平常者溫酒下其大風紫黑痿痹癱瘓攣屈喎邪臭爛危篤者不過一料全愈須絶欲戒性避風忌一切腥鮮鹽物五辛諸毒只宜食淡方能見效紫雲風去牛黃芒硝加血竭一錢乳沒各四分云顏成形不退腫起以艾作小炷四圍團團灸每灸五七團泄其氣即愈蛇皮風魚鱗風加白花蛇末一錢冰片二分有細瘡乖癘同治漏蹄白癜風加牛黃三分臭加水飛雄黃末三分五釐冷麻風加羌活獨活歸尾各五分瘦弱者去芒硝加人參五分地骨皮柴胡各一錢內熱者加川芎白芍黃芩山梔各二錢歸尾一錢五分爛瘡用枯礬四兩硫黃信石煅各一錢花椒三兩生礬五錢蛇床二兩共為末用豬油調敷手腿大爛不收斂用黃蠟一兩東丹五錢膩粉二錢乳香沒藥車米各三錢桐油調油紙攤貼爛瘡用爐甘石錢龍骨三錢乳香沒藥雄黃各五錢研細乾摻風癬用蛇床子雄黃砒等分為末醋調青布包之重重頻擦癢塊用車米硫黃各一錢大風子一兩樟冰雄黃各二錢為末以生芝麻二合炒黑研和如泥以生布包擦塊上四五日愈爛者不用其破者皆屬脾經毒已從破處出內服追毒則自愈起泡者用蛤粉車米石膏乳沒等分研末敷之眉落者用荊芥防風白芷蟬殼天麻首烏羌獨活各五錢丟子肉四兩牛蒡子大黃各六錢眼赤加菊花五錢兩眼痛去大風子二兩加全蠍七錢蜜丸桐子大臨臥以方中止去大風子將各藥銼劑煎之送下五七十丸生眉用牙皂炒加麝香少許雞蛋油調生絹包擦眉稜上二十日可出黑斑用牙皂鹿角屑白附子等分為末薑汁調惟塗久脫常妙吳氏亦以此方得名每油四兩用乳沒六分血竭二錢芒硝八分牛黃三分服之雖效總