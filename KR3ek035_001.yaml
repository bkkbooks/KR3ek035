body:
  text: 卷一風癩論四時酷烈暴悍賊邪風也為病最甚殘害最劇古人稱癘為惡疾之首患之變敗形質頑固不知所之酷惡毒也烈凶猛也暴速也悍剛也皆風之質也春夏多有旋風秋令多有飈風冬有嚴寒皆煞癘之邪氣也經云冬至之日有疾風從東南來者名曰賊風最能傷人犯之不可解俯仰動作不可得矣按之應手而痛烙尉則爽時刻抽掣擊剝疾火沖蕩氣血輕者結為瘰癧重者聚為偏枯若遇熱鬱摶凝則變為附骨癰疽如寒濕凝滯深入臟腑久則積成風癘人皆不知陰陽和平寒暑適時則疾病不作若天地變駁風濕舛逆是為不正之氣則人感而病焉説文云蟲入幾中曰風故風動而蟲生蟲無風而不育諸蟲皆八九日而化感八風之邪氣而成形也靈樞云從東南來者曰弱風其傷人也內舍於胃外在肌肉其氣主體重從正南來者曰大弱風其傷人也內舍於心外在於脈其氣主熱從正西來者曰剛風其傷人也內舍於肺外在皮毛其氣主燥從正北來者曰大剛風其傷人也內舍於腎外在骨與肩背之膂筋其氣主寒從西南來者曰謀風其傷人也內舍於脾外在肢腋其氣主弱從西北來者曰折風其傷人也內舍小腸外在手太陽之脈脈絶則溢脈閉則結而不通若死其氣主關格痿憊從東北來者曰凶風其傷人也內舍於大腸外在兩脅肋骨下及肢節其氣主強徑洞泄從正東來者曰嬰兒風其傷人也內舍於肝外在筋紐其氣主經乃煞癘之邪氣非時暴悍酷烈之毒中於人身即生諸蟲滋蔓為害自古聖賢避色如避寇仇避風如避矢石鮮有大病而人不畏避妄肆縱欲荒色內虛惡風乘假而入故多疾病黃帝云八風之毒百花犯之無色百穀傷之不實草木觸之枯瘁禽獸中之顛猘水御之狂越土蓄之崩裂人中其邪則成麻癘蟲生臟腑啖肌髓飧血液形態醜惡神思昏迷遍身瘡穢先儒曰癘即此候也中古分為風癘二名內駐曰風所感深外著曰癘所感淺風甚於癘而癘輕於風形氣本源則一類也又曰風入臟腑久注脈絡數年之後發於肌表由漸而變癘一傷人即發瘡穢至見敗形故風疾發遲死速癘病發速死遲大害皆然江北燕冀呼癘為炮瘡南人擬其名而曰楊梅瘡又曰廣東瘡蓋閩廣間有室女過癘即生蟯蟲發為惡瘡穢毒極盛其氣易於傳染殺人因此滋蔓於世相感而生充塞脈絡之內輸散分肉之間榮衛不利肌腋膹䐜氣聚不通使血淤不流筋骨馳縮膚體腐爛膿穢淋漓眉須脫落手足痿痹趾指墮折寒熱麻癢或如捶楚如掣掌如攣如縛如拶如夾瘸癟腫酸荼毒疙瘩百惡對駢集得之所由有五充貯而滿也分肉腠理也輸運納也膹結滯也䐜脹悶也瘀凝寒也弛渙散也縮拘急也穢汙濁也淋漓黏汙也毻敗脫也痿半邊罷軟不舉也痹頑痛也指手指也趾足指也麻不知痛癢也捶擊刑也掣牽絞也掌以木為刑床傑住不容轉動也攣筋縮也縛繩縛也拶刑其手指夾刑其足踝此皆痛而難忍者言風癘有此異常之惡候也瘸手指屈倒不能執物也癟肌膚枯稿也腫高起也酸骨節麻痛難動也疙瘩顆塊也此言風癘之形勢也足少陽膽其榮在須足少陰腎其榮在發衝脈任脈為生經之海謂之血海其別絡上唇口血氣盛則榮於頭面須華髮美若血氣衰則脈絡虛耗不能榮潤故鬚髮頽落也風入榮衛關節壅閉氣血不舒皮肉不仁膚腠浮腫虛脹自覺如堅厚之狀痛癢不知故曰大麻風病源曰風癘之相感皆由惡風寒濕房勞嗜欲醉飽露臥變駁所成二者病源無異患害之由五條明列於下一曰風水陰陽所損地脈方向吉凶之理曰風水星曆盈虛曰陰陽如修築安葬豎造開鑿植伐之類皆有年命相問神煞禁忌犯於幽冥測然致病巫人之本命元辰為害遍身痠痛走注痿痹金神七煞為害偏枯口眼歪斜半身不遂軟弱痿困白虎為害渾身塊瘰腫痛臭惡濃血淋漓天罡大煞為害蠱脹滿塞迷悶癱瘓八煞將星為害奔走狂越逾垣上屋嗷號悲笑無倫暴惡持刀鬥勇五土猖鬼為害噤暈昏迷腹大肢軟癰疽疫癘太歲月將時日星辰為害變異不測無所防禁俗之風水陰陽所損不可醫治其謬之甚夫陰陽神煞不可瀆其無而闢慢之亦不可信其有而諂媚之皆惑於偏也且妖邪之祟若觸犯於人不過一時之間豈有終身隨而為禍之理亦因人氣血不正受其邪氣而病生焉若調其氣血清其思慮則神正而復元使邪氣漸消而安矣故云燮理陰陽以和元氣大道君子也醫家十三科之內亦有祝由一科以符水咒訣禳辟邪魅妖氛而歸揖正氣巢元方云脈遽遲伏或如雞喙或去或來此邪物也若脈來微弱綿綿遲伏不知度數而顏色不變此邪病也若脈來乍大乍小乍短乍長為禍脈也若脈兩手浮泛細微綿綿不可知者但陰脈亦細此為陰蹺陽蹺之脈也其家會有患風病死者乃若恍忽亡人為禍也若脈洪大弱者社祟也若脈來沉沉而澀或四肢重土祟也若脈來如飄風從陰趨陽風邪也若脈一來調一來速鬼邪也若脈有表無里邪祟為害也以寸為表脈以關為里脈有表無里者乃兩頭有而關中無也曰隔絶不至之脈也若尺脈上半不至關為陰絶寸脈下半不至關為陽絶故曰陰絶而陽微死而不治此名妖怪之脈乃氣血神思受邪而見於脈也然皆虛妄之談亦巢氏病源並諸典籍考究者姑書之以補不足之論二曰源流傳染所襲人稟父母精血而成形受天地造化而為用故觸天地不和之氣則病焉若父母素患惡疾必精血有毒交感於胚胎傳至於兒女凡風勞病人皆有惡蟲於臟腑代相稟受傳染源流故曰傳尸須於幼年未曾發病之先預常服藥使蟯蟲內死不得長養滋蔓延育為害若至長大婚配耗散精神虧損氣血病作而難治矣今人焉肯於未病之先延醫調治哉故使病劇無療臨危措手咎在微時不治之故若其人未染惡疾之時所生兒女必無傳疰若既生惡疾之後所生兒女定難免之先君諭之曰吳中有一富翁患癘病吾治愈久生一女適人不久其夫染大風其妻終身無恙而毒氣遺疰於夫實大異也又有一人風病而死其妻無病再適於人其後夫即患前夫之疾無異數年而死其毒不遺於妻而婦人受毒在臟腑於交感之中移疰男子以受害想其毒初在交感淫欲中來原在交感淫欲中去可不畏哉又有一人風癘而死生三子一女皆患風而死又有一風病人之女無恙適於人生一子幼即患風者不傳於女而傳於甥也古云世有惡疾不娶信可警哉又有一徽商三代癆病而死第四代之子於髫齔時即隨母舅往兩廣為商並不回家其父在家勞瘵既死之後半月其勞蟲飛至廣內到其子店中其子偶出赴席其蟲徑入房門上鎖內有一老僕竊見此蟲即以物塞其鎖門急報主人忙將濕泥厚固鎖上連門栨撬下烈火焚之木皆成灰鎖已迸開其蟲猶活取出搗爛煅之後方免禍其傳尸之惡如此宜預防之姑録以告將來君子三曰氣穢蠱疰所犯他人之毒傳之此人曰疰因其穢惡之氣觸感而成也若人血氣虛脾胃弱偶遇惡疾之人聞其汙氣或對語言而病人口內之毒氣衝於無病人之口鼻直入五內則發為病又如惡疾人登廁之後而虛弱人或空腹人隨相繼而圊則病人泄下穢毒之氣未散衝上從無病人口鼻直入於臟腑其如清晨未飲食之時犯之禍不旋踵百難逃一如汗氣相傳痢疫相染者亦一類也閩廣之間造成蛇蠱符水魘癰之毒最能害人有患惡疾之人乍死毒蟲皆從七孔中出一遇生人則飛蠹潛伏為害昔人從古墓經行內葬惡疾之人已久死骸腐化其蟲疰人發為大癘而死故有九疰之説皆由體虛而受飛蠹傳尸之毒或風寒暑濕之邪客於榮衛注於經絡陰陽失守隨氣遊行而成大害一曰風疰乃人死三年之外神魂化作飛塵著人成病皮肉掣振遊變不定一年之後毛髮落頸項痛骨立肉解目痛鼻酸齒蝕發為蠔風則頑痹或如蠔螫或癢或痛二曰寒疰心腹滿悶懊痛嘔沫三年之後大便出血青白色腰脊強發為絶風則不覺絶倒三曰氣疰如失神機妄言譫語百日之後體重乍來乍去一年之後體滿失顏色二年之後變吐作蟲難治發為顛風則披髮狂走打破器物或發狂風則嗷干語哭四曰生疰心脅轉痛無常三日後體痛移易牽掣沖絞心脅一年顏赤目紅二年吐逆不利變蟲難治發為列風則身生瘡眉毛脫落若發罩風則舉身戰動或口鼻喎斜五曰涼疰心下乍熱乍寒一年四肢重喜臥噫酸體浮腫皮肉黑瘦生澼目黃爪甲唇青發為害風則口噤面喎肢軟六曰酒疰體氣重熱氣從胸脅上下無處不痛一年四肢重喜臥善噦噫體酸面浮腫往來不時發變大風則腦肉裂目系痛惡聞人聲七曰食疰心下𩊅音報痛懊憹徹背一年羸瘦皮腫體黑從腳而起臍內時常絞痛發為水風啖食眠臥汗出八曰水疰手足腫百日體黃髮落兩目失明一年難治三年身大水盛生蟲不治發為濕風則頭痛欲卻中發為柔風則手足眼鼻遊腫九曰尸疰體痛牽掣非常肉白血靿音袎喉如吞物發為汗風則骨節痛強此九疰之病乃癩風毒之根華他東垣諸先聖皆論之惟巢元方最詳故纂著於卷帙四曰保養失度所發忍飢勞役醉飽入房縱欲毒怒憂愁思慮妄想貪嗜邪毒蘊積穢濁外蕩樂佚內耗真元以致火熱之邪沖激臟腑凡烙肉生菜怪味之物入腹皆變為蟲水土不服沙冰嵐瘴皆為留毒久而不散積成麻癘發則變形養生禁忌云醉臥露濕必生癩疾又云魚無腮者食之五日生癩夫人為萬物之靈生於天地之間宜惜身命保養元神永延長命古之聖賢以道德奉天壽至百歲為常後世之人以六欲七情為事故多夭折殤殂忤違天地賦生大恩矣巢氏云凡病四百四種總而言之不出五種風毒所成一曰黃風二曰青風三曰赤風四曰白風五曰黑風人身中有八萬尸蟲共成人身若無八萬蟲人身不成不立復有諸惡病橫諸風生害人身所謂有五種風生五種蟲皆能害人黑風生黑蟲黃風生黃蟲余皆仿此此五種惡氣生五種毒蟲害於人身名曰疾風入於五臟蝕人臟氣其蟲無數在人身中食骨髓來去無礙若食人肝眉睫墮落食人肺鼻梁崩倒食人脾語聲變散或啞食人腎耳鳴啾啾沿生瘡或如雷聲食人心膝虛腫足底穿爛難治夫心乃君主之位不受邪觸故應死其脈來徐去疾上虛下實是其候也五曰感冒積鬱所生風寒暑濕燥火之氣為天地之六淫若不避忌感其鬱蒸或逞勇悍乘汗渡河踏冰履霜醉飽當風房勞入水露臥濕席或時炎暑喜臥藤竹漆床涼菌柳木臺幾濕冷之氣逢迎汗液入於肌膚邪毒漸深剋剝榮衛初起麻木久變尸蟲蠹齧肌體則風癩生焉皆人自輕身命縱性妄為輕犯天地陰陽五運六氣積成大病不惟煞癘之氣宜避即四時敷和之氣亦宜謹守若縱房勞氣血弱而復犯之即發為害巢氏云汗出入水冷透肌體或飲酒而臥濕地或當風坐臥樹下及濕草上或身癢搔之以乘疾風迅涇漸生瘡㾦經年不瘥即變風癩病機云八方氤氳鼓邪害人若客經絡久而不去與血氣相擊則榮衛不和濕邪散溢面色敗皮膚傷鼻柱壞鬚眉落八風者西北乾方尊之曰老公乃乾稱父之意也名曰金風一曰黑風二曰旋風三曰風其發病之由奄奄忽忽不覺得之七年後眉毛墮落東北艮為少男名曰石風一曰春風二曰遊風三曰乳風遇中此風體頑肉堅斑白如癩十年後眉毛墮落正東為震長男名曰青風一曰終風二曰衝風三曰行龍風若中此風手足生瘡來去有時朝發夕發五年後眉毛墮落正北坎為中男名曰水風一曰面風二曰瓦風三曰敖風偶著肌體春秋生瘡淫淫習習類如蟲行遊走無定十年後毛墮落西南坤為老母名曰穴風一曰陰風二曰臚風三曰腦風初受此風不知痛癢亦不生瘡漸成白癩十年後眉毛墮落東南巽為長女名曰角風一曰因風二曰歷節風三曰膀胱風此風有蟲三色頭赤腹白尾黑三年後眉睫墮落蟲出可治南方離為中女名曰赤風一曰大風二曰搖風三曰抖風若中此風身體遊遊奕奕心不安寧肉色變異十年後眉睫墮落西方兌為少兒名曰淫風一曰缺風二曰明風三曰清風此風發時百日後體肉蒸熱眉發墮落皆由內傷七情真元失耗氣血衰弱者感之如調養固密何由致此哉受病所在經絡先中於手太陽足陽明胃經其次延及手足太陰不發病者何也蓋肺主皮毛而遇風寒足太陰脾主肌肉而逢濕熱百骸流注六經傳遍皆因三焦相火熱甚制金不能平肝木肝獨勝而生風故相剋侮以致肺金脾土皆虧風熱寒濕諸毒化生九蟲鑽齧臟腑手陽明大腸之絡環交口挾鼻孔出於迎香貫於齒縫而下肺膈足陽明胃之絡亦在鼻額齒中而行挾臍氣衝風氣皆由出入故先中焉手太陰肺其竅在鼻主一身之皮毛足太陰脾其竅在唇主一身之肌肉亦風氣之門戶故風病多見唇鼻爛壞也是以金燥而惡寒土卑而忌濕故寒熱作也風濕內扇諸火皆動金氣有虧木無所制木旺而侮土脾乃受傷而肺無滋養子母俱弱則風木獨旺心火炎炎血熱妄行其所積穢惡邪毒風濕火相扇化生九蟲吃蝕臟腑則為癩風食肝毛脫食肺鼻崩食脾聲變食腎耳鳴食筋節解食肉痛癢食皮頑裂食脂起疱食心而死內經備言腸胃為市無物不受無物不包飲食不謹朝傷暮損積久成熱濕熱相積諸般奇蟲各從五行之氣而化生亦如腐肉生蛆腐草化螢之理外臺祕要載有九蟲食人臟腑一曰伏蟲長四寸許為諸蟲之首二曰蛔蟲長尺許人常生之多則貫心殺人三曰白蟲長四五尺子母相生形勢轉大亦能殺人四曰肉蟲食人之肉令人煩悶五曰肺蟲其狀如蠶令人咳嗽六曰蛔蟲狀如蛤蟆令人嘔吐逆善噦七曰弱蟲又名腸蟲狀如瓜瓣令人多吐八曰赤蟲狀如生肉令人腸鳴九曰蟯蟲狀如菜蟲形至微細居廣腸內即胴腸也多即為痔瘻甚則為漏澼劇則為風癘因人瘡處已發癰疽癬瘻瘑疥齲蝕若元氣壯實未為大害稍有虛損遂侵蝕隨之其蟲動而變生多病如嗝噎癆瘵癩風蠱脹之類又有螇鼠應聲蟲奇怪之類未易悉舉蟲之為害大矣哉中於手少陰面目舌赤翕翕然發熱喑不能言久乃生蟲蝕心則足底穿膝虛腫渾身潰爛涎膿腥穢者榮血先死矣舌乃心之苗君火妄動必舌枯無津液也火氣燥金故音啞而發熱虛火下流熱毒注腎直出湧泉故腫痛循膝節而至足底穿爛無可救療心主血火炎內泛則渾身腫腐皮肉傷殘不能聚斂毒入於心血泛無制七年不治中於足厥陰面目多青惡風自汗左脅偏痛久乃生蟲蝕肝則眉發焦毻滿身生黑斑若指腫攣癟墮折者筋死矣木泛形色於外肝氣已敗濕土無制故惡寒自汗其絡循陰器布脅肋上入頏顙肝脈見左關故左脅偏痛眉發焦脫者血不滋養氣不充潤如木無水灌而枝萎葉落也生黑斑者乃腎水泛上也指屈趾爛者如木朽根枝死也癟攣者正謂肝木乾枯也肝病多癢痛風木動搖故也三年成大患筋死不榮為病已劇中於足太陰四肢怠惰皮肉瞤動身體虛黃久乃生蟲蝕脾則音啞膚癟若麻木不仁者皮死矣脾絡注心循臂故四肢倦土敗不能安堵故肉瞤動振跳也氣弱不磨穀食故怠惰不思食味或食息則四肢不收血液阻涸不能賙濟故啞而癟脾屬土惡濕其氣既敗不能運動矣故發麻木然麻乃不仁與平常皮肉不同按之如隔一紙木乃肉內唧唧然不知痛癢而酸楚之至也蓋麻是氣虛木是濕痰死血為病既麻又木乃氣虛濕聚血絡枯涸晝夜不行絶不充潤於皮膚也經言濕生痰痰生熱熱生風丹溪云濕熱必生風風甚則生蟲正如腐草化螢濕熱之氣乘風也病人於脾則腫脹多水非是濕熱生風因有濕熱在內則風乘隙而入也六載病成十五年不治中於手太陰面頰浮白口燥喘急久則生蟲蝕肺則鼻梁崩塌若眼斷唇翻失音者不治乃骨死矣金性燥故口乾火熱煏之故發聲喘急其竅在鼻蟲蝕肺故山根崩折劇則鼻柱爛落金敗不能生水腎氣必虛故目暗乾枯皮急棚而吐痰氣泛漫於脾中故唇厚而翻熱氣聚於會厭故失音聲也如金器碎則無音律骨屬金故髓枯而骨死病入肺經皮枯不仁三年之後難治中於足少陰面耳黧晦腰脊引痛小腹隱隱不利久則生蟲蝕腎則耳鳴啾啾沿𦗴生瘡或癢或痛若割切不知痛者肉死矣腎水泛上故變色或灰或黑耳乃腎之竅水枯精乏故耳熱生瘡腰脊引痛者虛極也津液既絶為病痠麻不知痛癢腎邪最速一年即成大患矣中於足陽明額多汗膈塞不通餐寒則啘啖音噎儋久乃生蟲蝕胃散蠹周身則皮癢浮遊若欷歔蒙眛食減倦憊者氣死矣胃絡循於目之上下故額多汗脾胃氣弱五穀不消膈臆填滿上逆嘔吐氣血不通皮膚自癢神魂離散臆滿則欷歔不爽腸氣既敗疲倦惡食也經云腸胃為市無不包藏熱積於中必泛形於外胃腑受毒勢由蟲瘴膚體脹腫虛浮二十年不治癩風之害根於六淫中於六部發為六邪部各六種症名三十有六六淫即風寒暑濕燥火乃天地六欲不正之氣也六部即心肝脾肺腎胃也六邪即痛癢麻爛脹憊之六病也胃居脾之下為受盛之司藏納五味故多受毒與五臟同風癩異名六部每各六種故有六六三十六件由八八有六十四卦也天時毒氣臟腑混淆互傷舛疰變症源當然肺病則痛胃病則癢腎病則麻心病則爛肝病則攣脾病則膿金之氣燥故作痛土之氣濕遇陽乘之則為沙塵故癢遇陰乘之為泥淤則軟水之氣寒陽蕩之則麻陰凝之則木皆不知痛癢也君相二火能敗諸物潰爛風木之性動搖牽引縮伸為攣其五臟六腑榮衛肺絡充貫人身聯絡相繼淫邪中人則周身沿蠹豈有止於一臟而別經不傷之理其先中之經絡與後中者在輕重之間耳但一臟受病則餘臟難免其傷且如麻木腎病也殊不知麻乃風氣乘之木乃濕兼寒也外雖不知痛癢而骨肉間反知痛癢者乃腎病重而肺病輕也麻而軟痿無力者脾腎相殊也麻而足長短手攣者水不滋木肝受病也麻而潰爛者水火不相濟上犯於心也又痛乃肺病如痛久而癱者母不能顧子脾氣害也痛而麻木者母弱難扶其子腎氣虧而受毒也痛而覺癢搔之則痛極難忍者胃氣虛而毒氣入深也痛而潰爛者肺不能生水以制火而金火相刑也余可以此例推感於不測貯於無稽曰癩曰風異種類聚心主血肝臟之毒傷血分則心肝發病肺主氣凡風癘皆因氣悶而生腎藏精色欲房勞為害脾胃通連而藏穀氣其醉飽五味之傷在此故風之為病惟在心肝脾肺腎胃之六經受邪其餘六經不能容受不被所傷無所幹犯故風癘不由此而起手少陽三焦乃無形之腑厥陰包絡乃附系之經陽明大腸太陽小腸為出入之門戶足太陽膀胱僻居下元少陽膽乃清淨幽間之司邪毒之氣皆不傷犯而藏蓄況肺之竅在鼻氣從而入脾之竅在唇味從而入病始之由多是氣味之感故先見於皮毛之間病源曰六部各有風病六種共三十六種皆由六欲七情寒濕風熱邪毒之氣傳疰膚體周流百節絲絡交錯凡中傷者非在一經非發一症故治法方藥浩汗彌常取效者惟靈寶大藥名平分家産方最為王道治三十六種風皆有全功其次止東華玉髓水制黃香丸又名黃龍丸小還丹等數方而已亦能治諸風其餘一方止治一症若以他治如水澆石罕有取效者而大風之外又有癩瘡十四種後世因其病勢顏色之多端而巧立名色以惑人上古止言風癩並無奇異繁名凡言臟腑如此特其先惑之由耳若病一發譬諸風水隨處充滿流蕩百骸各經傳遍無不至焉三十六瘋六經分屬其大麻蛇皮脫跟魚鱗邪昧血風發於心經大麻風夫大麻風者乃諸風之長初起時發於身手按皮膚如隔一紙灑淅不仁或遇陰雨或至夜間則肌肉之內如漉漉然或痛或癢漸至皮肉堅頑剜切不知身體虛腫此症最易穿爛手足拘攣臭惡廢弛由於縱意妄為不避風寒暑濕六欲七情使榮氣虛衛氣實邪入於肌肉氣血滯而不通也此症以大麻湯並奪命丹神仙換骨丹珠雲散奪命還真丹等藥治之又云大風者初則體氣熏熱氣從胸中上下無處不痛四肢重喜臥善噦噫酸體面浮腫往來不時久而腦脹肉裂目系痛惡聞人聲危矣蛇皮風此症起於手臂股腿之間皮膚迸裂形如蛇腹之紋隔寸喬斷流出血水或痛或癢蔓延遍身此症最速勢迅而凶若不即治禁戒十難救一皆由性悍逞勇暴妄太甚觸冒風濕蓄之不散致犯心火焰焚肺竅遍敗五臟耗傷元氣用火龍散奇效良丹等方治之兼以大補之劑大料緊服之如妄行點刺熏蒸即死無逃矣脫跟風此症初起腳後跟並兩踝下發水泡或皸裂迸開或生小瘡或痛或癢或生腫蹇久而穿爛延至足底俗曰草鞋風遂至延於足趾頭上下及趾丫內生瘡痛癢淫爛者俗曰魚腮風即一類也與漏蹄風不同此由酒色太過不避寒濕敗傷氣血或辛苦之人寒濕凝滯釀成熱邪以致心火泛流肝腎風邪毒疰臟腑用苦參丸大消風散大龍散等藥禁戒酒色大補氣血免成漏蹄之害魚鱗風此症初起於遍身乾白浮癢麻木漸生小瘡變成梅花大片如刀刮魚肚之皮或如蛇背之紋癢而搔之則痛或出黃滋水冷熱皆怕或如榆樹蛻皮大小不一俗又稱為榆皮風則延爛成瘡渾身腥潰膿血黏穢皆由耗散氣血元陽虛敗寒濕風邪漫流肢體又遇暴勇忿怒房勞五味乘其侮而深入臟腑最能害人宜以大消風散一粒金丹火龍散等藥治之此乃心經毒疰腑之害也邪魅風此症初時偶爾好悲如醉狂言驚怖向壁悲啼錯詞歌笑或不言語夢寐喜魘或與鬼交乍寒乍熱心腹滿悶氣短不食古云氣疰又名狂風走入神廟妄言譫語時號嘻笑體滿失色久而癱瘓身痛危頓此由風水陰陽所損偶為鬼魅妖邪驚恐觸心或憂思妄想以致邪迷心竅損敗心液耳速用搜風順氣丸疏風散氣鎮心補血安養元神兼以內助扶救氣血可愈血風此症初起於皮肉之間如血灌周身充滿肌膚如被杖之狀或生血泡浮腫或朝夕來去陽氣乘之則早盛暮平陰氣乘之則晚凶早減或衄血吐血咯血或喜臥噦噫㕭酸或齒縫中時流血面腫目疼腦裂或生紅片如錢麻痛或腫處穿即流血不止或大便出血血虧則手足攣蹩血乏則形變神焦漸死乃心毒流於肝經火炎血泛邪熱太甚風濕外馳由於乘風行濕醉飽房勞好勇鬥狠入水迎風或忿怒飲酒或忍飢竭力以致邪毒攻擊疲困倦軟宜以補舊湯鉛汞膏二八濟陽丹等件散邪降火清氣養榮之餌救之免死其鵝掌鼓槌血痹糍糕痛風癲風發於肝經鵝掌風此症先於手心並指丫間生紫白癬麻癢頑厚抓之有白皮鱗屑搔後又痛又癢湯沃則爽每於湯中爬破或瘡或紅曰乖癩其形儼如鵝鴨腳皮故以名之或生於足面及穿鞋處混如鞋面而生俗云鞋帶瘡又名鞋套風其實即此風也久則穿潰穢爛膿臭延及遍身敗惡彌甚乃因勞心焦思飢飽肆欲汗露縱力風濕傷血或暴怒冷餐火邪入肝心肺戕害日漸虛損發於肝家故先起四肢四末次傷及根本也不可輕視最耗真元以大消風散二八濟陽丹小棗丹用心調治另有一種指甲浮薄隱隱如見血痕不痛而作拘急不爽名曰鵝爪風久則爛去爪甲指頭脫落大害難救每日清晨未梳洗取自己眼脂塗之久則自愈名曰還神丹內治以清陽散風攝血之藥久服可愈除此再無他法鼓槌風此症初起於肘膝間痠痛怕見寒濕風冷行步艱難俗醫皆認為寒濕腳氣久則肢脛屈弱骨節大痛腿肉漸去漸小膝踝脹大趾指痠麻痛爛墮落或皮肉紫黑形如鼓槌故有此名由感冒雨露勞倦臥濕恣食生冷喪敗氣血風濕無制邪傷榮衛肝血無拘流注脾腎液竭精枯致使筋骨不榮也以神仙換骨丹獨聖丹棗靈丹等藥治之另有一種怪症四肢節骱如脫止有筋皮相連不能舉動此名筋癬風風病之內或多雜之以黃藜蘆酒浸一宿焙燥研末名獨勝散每服三錢酒送下久服自愈血痹風此症初起時常疲倦汗出臥寐不時搖動形體如被風吹淫奕倦怠或時攻擊而痛久漸發出紫塊腫脹痛極則癢痠軟而麻癢極則痛或時穿爛臭惡跛攣敗形日夜叫號乃由體虛而風邪深入陰分氣血為風邪所擊肌膚弛緩皮腠疏開風邪暴侵肝家受病至心氣煏郁脾濕並疰故生毒蟲蠹蝕肌肉也以補舊湯鉛汞膏二八濟陽丹等劑治之庶免變傳無治糍糕風此症初起於眉稜骨上或起面類間發生㾦癗穿爛為瘡開大如錢或遍身先發小瘡遂變為爛其症但有膿水流出變成干堆黏汙結穢積厚甚腥汗流涎黏沾著之處即爛為瘡從首至足身癩眼坍鼻折唇翻又名眉風由貪酒好色不避風濕肝血凝結心火泛蒸陽氣墮散也急以補舊湯苦參丸大消風散等藥服之外用淋洗擦藥大補氣血為主痛風此症初起於身肌骨節間遊變抽掣疼痛晝夜無所休息手足不能屈伸坐臥不能轉側或筋緩無力或伏床癱瘓陽氣虛則夜靜晝極陰氣弱則日輕夜重病久則衣被不能著體濕氣盛則湯沃稍爽但浴一次則病增一分風氣勝則火煏而略緩離火更凶病久則加浮腫或噦啘不食或瘡爛不能收斂乃由房勞太過憂思妄想六欲七情日損氣血風濕邪毒傷憊肝液邪傳脾胃榮衛枯涸以致精髓敗絶或郁蓄私念不得發泄激蕩氣血而成或勇怒飢飽傷感疾風迅雨逆塞充漫四肢經絡為之行痹也其痛轉展不定又名旋風治以大定丸意通聖散陽起聖靈丹神釀丸等藥服之則可癲風此症為狂病也狂妄不情筋攣作振肢體牽掣號叫不已或屋簷駭走或歌舞哭笑毛瘁色敗皮肉腫脹寒熱交作或噦嘔咳吐氣疰云顛風一發跳入神廟妄言神鬼披髮狂走打破器物百日之後變吐作蟲手足痿蹩屈曲痛麻變症百出經云丹人身之氣血為正為內天時之風寒為邪為外若居處失宜飲食不節使臟腑內損氣血內虛風邪則外傷之矣肝臟血主魂悲哀慟忡則傷魂驚恐忿怒積鬱狠毒氣血敗亡矣以奪命還真丹四魔丹等藥主治再以養神攝血為要其半肢軟癱紫雲干風刺風癢風發於脾經半肢風此症上下痠疼或左或右注於身之半邊如酸如痛如麻如木如困如癡倦怠廢弛或虛腫或作攣拳或骨髓抽掣或遍身遊變或振抖若驚或痿敗若癱在左則死血凝滯在右則痰涎淤䐜或曰偏枯或曰痿痹久則眼痞唇歪背僂肢軟叫號而死乃寒濕疰於骨節風邪克敗脾土肺腎無根賊邪自勝也以救苦回生丹二八濟陽丹兼以大補元陽養血調氣壯本則愈軟癱風此症初如痛風之狀或作寒熱或麻痹不仁精神疲憊漸漸肢節倦敗怠惰困乏骨節痛緩手足無力身如柔綿或腫或癟拘縮攣急或節間鳴響或怕風寒遂成癱瘓水疰云手腳遊腫作痛四肢不收古稱骨痿即因痹也由風冷賊邪中傷髓液脾土不固五臟無本以致血氣虧乏以神仙換骨丹搜風順氣丸二八濟陽丹等選治紫雲風此症世多有之身生紫赤黑斑如錢延暈如雲霧之狀非疥非癬形似麻癩或稍作癢人不為怪視之如常久而腫起微見形狀漸覺麻癢抓之則痛或有皮起手足捉硬嘴唇微厚眼胞微腫或日日羸瘦或時腸澼隱隱口眼歪斜肢困力倦皮肉浸淫不時跳動間或幾處劇切不知毫毛脫落脈絡閉澀痿軟癱瘓攣曲變成爛麻難治蓋緣危敗遲而人不為異耳初起時又有錯認為汗斑忽而不治由七情蠹疰元氣損傷感冒穢毒積久蟲鑽五內酒色財氣郁忿暴怒風寒暑濕煎釀成之脾胃肝腎精血衰敗也以搜風四七丹二八濟陽丹久服有效干風此症身無痛處惟生灰白斑點與常皮肉略異肌膚乾燥手心足底發熱身體漸癟血液乾枯初視輕易不治久則氣消血枯倦困氣短減食無精若周身乾癟皮肉不仁已難治矣由大怒大忿大勇大怯戰兢驚恐或酒色過度或抱怨不舒風濕不知而自中寒暑不避而暗傷妄餐努力忍飢勞神以致脾土敗壞閉塞元神也以神仙換骨丹二八濟陽丹神效追風丸救苦回生丹升天腦麝散等方與紫雲風一般選用此種又可用蒸洗之法須行氣補血大養元神以活膚腠刺風此症皮肉間不時驀然如錐刀所刺霎然掣痛尋摸則不知甚則如割剜皮肉淫跳振躍閃然走痛流注不定或骨節間如火燒尉烙痠痛難忍久則不能動搖行履甚則衣被不能著肉眠臥不能翻身若經轉側刺痛幾死攣困而憊由體虛腠開則暴風入里邪氣與正氣交爭風濕擊駁急服迅藥逐去邪毒則愈若少懈怠則大病成矣不治宜以一粒金丹小棗丹等方擇治癢風此症渾身淫癢蜉蝣不息猶如腐木細蟲行於肌膚皮肉跳動搔之不止湯沃不息久則氣血衰敗津液耗竭癢入骨髓搔破成瘡彌爛方止又曰淫風曰𫋞子風內有細蟲著人其癢不見其形由不擇居處不節飲食濕熱自熾風邪並蠹脾胃虧乏化生九蟲鑽齧肺肝泛傷脾胃以大消風散六神輔聖丸二八濟陽丹防風通聖散選治另有一種遍身皮里渾渾如波浪聲癢不可忍搔之即血不止乃風氣復遇火熱而奔走膚腠名曰氣奔用人參苦杖青鹽細辛各一兩水二碗煎數沸飲之連進愈止又有血不榮於腠理以致體虛作癢火煏湯沃少息復作丹溪以凌霄花末一錢水萍末七分四物湯加黃芩煎湯調服其白癜蠔蠔歷節壁泥疹風啞風發於肺經白癜風此症初無痛處但皮膚麻木生灰白斑點久如塗堊頑憊又變亮赤色即曰紫癜患之不治亦有終身無害惟形狀怪異者又多有損敗氣血遍身皆然神瘁精疲減食憎寒壯熱怫鬱困怠而死者由淫毒傷肺金氣泛於外以克肝血毛髮枯萎也以棗靈丹玉樞丹選治又有夏日身生紫白斑點汗出則癢秋涼少息年復增之赤曰紫癜名汗斑也酗酒房勞感受風濕邪熱摶於皮膚血氣不和而發又名歷瘍又名汗黯皆一類也以雄雞內腎調麝香浴出敷之用新青布衫緊著睡一夜大汗出明早熱湯沃之其斑俱脫在湯內不發矣蠔蠔風此症偶然把搔誤觸皮膚卒然極痛難忍正如夏洞蠔蠔螫人之狀久則轉側動搖之間皆痛走注遊變如斜刀割刺肌肉叫號不已若及遍身無可救矣由乘汗入水踏冰履霜不懼寒濕以致心火泛焚肺經毒注脾絡以致毫毛不舒榮氣掣縮毛尾拳曲倒插肌肉以大消風散棗靈丹等方治之風疰云人死三年之外人魂代作飛塵著人成病皮肉掣振遊變不定發落頸項痛骨立鳴解目疼鼻酸齒蝕頑痹如蠔蠔螫也歷節風此症於腰膝腿肘肩膊之間麻冷酸淅漸覺走疰抽掣疼痛肢節腫大攣癟舉足不能甚則手指足趾節節痠痛俗名鬼箭風禱祀求神養成大病皆由妄性肆欲保養失節感冒所致六淫蕩敗血枯氣衰之故肺主皮肝主筋肺肝受傷血氣不運亦曰白虎風多發於肘膝臀胛之間人喚為鶴膝風惟在節骱間病也又曰纏肢風其在肢節間病也大人稱為著痹宜以定風散駐車丸救苦回生丹選之壁泥風此症身生灰白色片如陳壁土狀呆燥無光無所痛癢人不驚心殊不知肉死不榮矣乃素性矯暴或郁忿動勞不惜保養妄冒六淫寒濕風毒濫傷諸臟虛火兢起克伐肺金泛形於外以致皮毛枯稿形容憔悴血液不運手足軟痿也若遍身皆然而死此為風症之惡疾故凡風之白色者皆不易治以補舊湯奇效丹等方治之疹風此症初生癮疹形如麻豆疥癬之狀或痛或癢乃暴勇之時或微醉之際乘風露臥或浴後肌膚疏暢即被風邪所犯復有邪毒不正之氣並寒濕相乘注於肌中則邪熱之氣結於腠理逢陰雨即凶睛暖少緩屢瘥屢發久則連片穿爛使肺毒並心戕賊氣血以大消風散小棗丹玉樞丹等方治之又有一種面上風癬初起㾦癗似疥非瘡似癬非癬多感於春秋之時或癢或痛或作寒熱漸成細瘡黃膿腥穢滋水滴流黏處即變成瘡延蔓倏息名曰吹花瘡又曰吹花癬婦女多生之此乃肺受火炎蘊積風熱毒穢之氣陽邪上升故發於面部如在眉頭間起者凶但飄逸俏俐愛潔者偏生之或暴妄偏執驕傲者或陰毒固感戚者或醉臥乘風御濕者或恣食糕果油膩炙爆者皆患之倘又使陽火賊風沖激則勢愈盛若不速治被風火濕邪襲之妄為癘風延入發內則不能治矣急以清心順氣散肺火祛風解熱而止淫邪方可除根否則雖愈必發啞風此症音啞無聲肺氣者音聲五臟清明之氣皆貫於竅而為五音若溫融和潤則陽氣調勻真聲通暢若風濕陰邪摶於陽分凝滯津液使氣道不調清聲閉塞會厭是音聲之門戶懸壅為發音聲之關節若風邪觸於關戶橐鑰閉塞激動痰火輕則聲嘶而喉破重則語啞而失音五火皆動肺金傷敗以救苦回生丹奪命還真丹兼以涼血生津降火祛邪養氣和肺之藥服之則可其冷麻漏蹄蝦蟆核桃風水風熱風發於腎經冷麻風此症初時麻木久漸堅頑剜切不知或冷痛或節骱痠痛怕見霜露不能入水汗液不出或遇秋冬愈覺抽掣不能動履血閉不流則生水疱穿爛成瘡手足軟曲肌膚弛緩筋骨懈惰由酒色過度腎水枯竭或勞怒之時不避寒濕風邪中深內氣不固毒從外寇病極則癱瘓痿敗憔悴而死以奇效丹二八濟陽丹六神輔聖丹等方選治再以收濕補血之劑佐之漏蹄風此症於當腳底中央踏不著實處乃是湧泉穴內生小水窠淫癢搔破則流黃水疑是水窠疥瘡視為微疾久漸成瘡內生蠹蝕爛穢不斂漸至對腳背上穿爛流膿一身之氣直注下流無所關阻津液氣血下敗不收俗名穿心腳底風死者多而活者少因初不速治之咎也由勞役太過風濕乘襲色欲太盛腎水耗竭憊傷心主妄想縱肆貪淫無厭憂思克念氣血難聚之故以苦參丸奇效丹火龍散等方選治之蛤蟆風此症身生瘰塊大者如拳栗小者如彈丸凸起高低麻冷疼痛肘後酸徑或癬癩小瘡紫黑腫脹形似蛤蟆之狀俗名癩麻風穿即成瘡流膿臭穢由酒色荒淫無度傷敗腎水又遇水濕寒邪聚損脾絡周身敗壞以班龍八帥丹奪命還真丹神效追風丸擇而治之生疰云名曰糾風使心脅轉痛體疼移易牽掣沖激心脅目赤吐逆眉發毻脫身生毒瘡皮黑㾦瘰形如癩蛤蟆之狀南方呼為癘廝蟆也另有一種頭面遍身肉內發起腫塊如蛇盤之狀名曰盤核用雨濕磚上青苔藥細末水調塗之核桃風此症初起疙瘩高低塊瘰紅紫壘壘大者如栗三五連串小者如槐實色如葡萄之狀顆粒皮間乃憂思過度房勞太甚邪傷腎水神無資助風濕妄肆於膚絡之表急用火龍散棗靈丹升天腦麝散救治若仍不禁戒色欲則腰背屈曲手足痿頓指膝攣毀口面腐敗鼻崩眼坍骨蒸發脫而多汗體常牽掣而強直皮肉隱痛喉如吞物者害則甚矣又名汗風亦名葡萄風又有一種或於手掌指膊或足腕股腹肋脅之間或頸胲頭面之上生細黑塊瘰若天明氣朗則隱而不見遇陰雨濕蒸則發之或平日不見一交酉戌之時則發淫癢抓搔則痛或天氣晴明其色鮮紅或浮白作癢陰雨則晦黑紫痛者名曰妒癡瘡鬱火風邪蕩注臟腑也速以祛風養血調氣清陽之劑治之不爾則成大風矣水風此症初起如水臌四肢浮腫飽悶痿憊後漸周身發疱灌水穿則為瘡膿滋腥汙霎時潰爛若於肢節間發則軟癱不能行動發眉為脫手足攣折鼻崩唇翻趾掌毀墮又曰爛風若臍中時常絞痛飲食坐臥汗出漸漸羸瘦若腫從腳起者害甚急矣由酒色暴勇性狠偏狂怒忿氣鬱榮衛敗壞精液枯涸又被濕毒寒邪傷損五臟虧耗脾腎或怒入水濕滯凝留之故此種多是風水陰陽所損年命神煞為禍以搜風順氣丸苦參丸升天腦麝散兼以祛邪調氣養正扶神之劑方愈熱風此症初起目脫惡風寒戰鼻中常流黃濁涕或咳吐膿血鼻崩眼坍耳塞而氣閉不通救遲則死又水疰云熱風即濕風體黃髮落兩目失明三年身大水盛生蟲內蝕五臟津液由勞役太過腎水枯竭肌膚不固暑濕風熱暴火之氣先從毛皮而入後傷氣道肺液受虧五火乘邪而起此等正謂保養失節所致也以搜風順氣丸棗靈丹神效追風丸等方治之兼服大補元陽之劑其雁來疙瘙雞爪螻蟈泄蠱風發於胃經雁來風此症每起於七八月間作時則手足乖癩燥癢形如蝕癬或白或紫或頑厚如牛領之皮搔破則血水流出疼痛無時交春則愈交秋則發按年如是故曰雁來風感受非時也然癘之邪毒蠹肺金五火交作風濕乘之則發矣若雁去時不愈四季皆然則成大風矣以奇效丹六神輔聖丹升天腦麝散治之南人呼此曰社風瘡蓋雁乃春社去而秋社來也又有一種濕癬名歷瘍瘡亦於春二月秋八月雁去來時發於四肢軟而漸大熱痛亦名雁瘡荊漢人多患之與雁風同治另有一種每至秋冬則手指或遍身發紅點作癢乃寒氣攻於腠理陽氣閉絶不能發越拂鬱而作亦名雁風治以人參敗毒散解其表補中益氣湯實其里則愈又有一種每於二三月乃手足生疥癬之類名痹瘡形如雁風交秋風變則愈名曰燕瘡或發於頸項之上與雁風同治疙瘙風此症初發㾦瘰五色癮疹遇熱則癢逢寒則痛搔之成瘡久則寒熱交作蟲齧肌體形如蚤蟲瘢痕隱隱在內復感寒濕則斑爛癱攣難治若發於腳背並趾頭後跟連片紫白其腳面大胻音行骨俱無名曰鞋帶瘡又曰草鞋風由寒濕風邪客於皮膚漸入榮衛肺金受制脾胃空虛土衰水賊又遭霜露觸之即發巢元方云初生斑癩隱隱如癬或紅或紫或黑或白漸大變形或腫或癟或癢或痛久成瘡筋骨痠痛冷熱抽掣膿涎臭穢肢體敗爛而死乃酒色太濫荒淫無度或陰毒傲慢含蓄鬱氣傷肝乏力勞神覆敗腎水又遇風濕注損胃絡遍延臟腑致成大病以六神輔聖丹苦參丸神效追風丸治之如發白燥癬瘡從手足起者名曰四末風最難治雞爪風此症手足自搖振抖無力不能持物舉動艱難牽引攣縮霎時僵直或節骱麻木大痛腿肘轉筋乃穢毒過傷也肝胃太薄濕熱已極血涸骨枯肺肝損壞亦有地理陰陽所損成患以大麻湯真方奪命丹大消風散等方治之兼補氣血清陽養元為上螻蟈風此症漸生塊瘰三五連串大小相貫肘膝先見者輕頸項脅肋先見者重漸大成串延長如土狗蟲鑽入地穴身之病形或作實熱或痛或癢俗醫認為栗子治之反速其禍久則周身穿爛而死乃犯惡毒臭穢不正之氣暴觸胃腑大毒伐脾五內皆空泛走膚絡氣血虧弱惡邪外鼓九疰之蟲毒蠹於肌表須斑龍八帥丹苦參丸真方奪命丹玉樞丹等方治之再加熏洗方愈又有一種渾身火泡如甘棠梨樣破則出水內有石一片如指甲大穿則石出方愈其泡復生不已抽盡肌肉則死以莪朮三稜各五兩為末作三服溫酒送下則愈嚲泄風此症或肘不覺強徑暈倒手足無物或舞踏牽掣或攣拳伸縮肢冷臥地俗名打鳥風即此也寒疰云即名絶風心腹內悶懊痛嘔沫久則大便出血吐涎青白色腰脊強時不覺絶倒在地與癩症相似蓋人以胃氣養內灌溉經絡肌膚若肆欲醉飽房勞憂怒使胃氣衰竭以致經絡虛耗則筋肉懈惰肢休弛縱不能取攝風邪漸搏氣血渙散困乏痿頓以一粒金丹奪命還真丹真方奪命丹四魔丹兼以祛風降火消痰調氣之劑治之免成大風穿爛癱瘓難治蠱風此症初起腹大肢瘦形如蠱毒眼赤唇翻久則渾身脹腫皮內紫黑浮大虛腫毛髮先落形貌醜陋後則腐爛危困或身動戰口眼歪斜攣屈又稱為畢風勢惡危速而易於傳染害人乃氣血虛損以致九疰毒蟲入於胃腑流蠹五臟也或因寒濕太重血滯脈絡虛火擊搏而成以救苦回生丹搜風順氣丸四魔丹選治此種亦有邪祟不正陰陽所損之故又有一種面上生瘡如貓兒眼睛不放光生彩亦無膿出冬天自退頭背皆然名曰寒瘡亦怪症也由多食雞魚蒜韭之故用溫補之劑自愈夫歷節蠔蠔疙瘙雞爪刺風皆痛風之類也魚鱗鵝掌雁來疹風干風皆癢風之類也病症之類最多如走疰而痛者風與邪氣流行也痛在一處定而不動者死血聚也抽掣遊變霎然如刀錐刺尋之不知其所者乃濕流關節也夜劇晝靜者陰邪侮陽也暮蘇旦甚者陽邪侮陰也如遇陰雨或至隆冬嚴寒則發者寒濕摶凝也似痛非痛灑淅不知其處者勞傷氣血濕痰散走也皆邪氣傷於內與臟腑傳應而作也若癢則不然皮膚之上浮遊淫癢者血虛火氣乘之也外雖癢而內覺痛者邪在表而毒注內也烙之以火沃之以湯則爽者勞傷瘀血凝滯而不散也癢而搔之又痛者血虛熱氣聚也癢生見陽則腫者元氣虛敗諸火布於腠理也古云痛無補法又云癢麻虛宜補疼痛實宜瀉又諸痛無補諸癢無瀉實乃邪氣充灌經絡補則助邪為害矣虛乃正氣虧乏瀉則引邪深入而無救矣紫雲白癜大麻核桃啞風皆冷麻之類也脫跟糍糕蛇皮漏蹄血痹熱風皆爛穢之類也凡似痛非痛似癢非癢或抓刺剜切不知或按於肌膚如隔一紙之狀或酸淅頑癡之類皆曰木篤而麻也凡瘡癢穿潰膿血淋漓濁水滋黏迸裂皸破皮內腐惡皆爛壞之屬也蛤蟆螻蛔血風水風蠱風顛風皆腫脹之類也邪魅鼓槌軟癱壁泥半肢嚲泄瀉皆痿憊之類也凡身體虛浮腹大如鼓手足頭面腫大皮肉如癱而不穿凹凸不定或胸臆悶塞脅肋䐜憤氣不升降神不舒爽皆腫脹之類也凡手指攣瘸腿趾跛蹩腰背傴僂口眼歪斜身體痿軟疲困左癱右瘓乾癟僵直廢馳行步艱難皆憊壞之類也
